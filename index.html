<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>time aligns</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  /* ══════════════════════════════════════════════════
     TOKENS
     ══════════════════════════════════════════════════ */
  :root {
    --ink: #0A0A0A;
    --paper: #FFFFFF;
    --hover: #F7F7F7;
    --buffer-bg: #FAFAF8;
    --rule: #D4D4D4;
    --rule-hair: #ECECEC;
    --rule-fine: #F0F0F0;
    --mute: #6B6B6B;
    --mute-soft: #B0B0B0;
    --accent: #FF4A02;
    --accent-soft: #FFE8DD;

    --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
    --s-5: 24px; --s-6: 32px; --s-7: 48px; --s-8: 64px; --s-9: 96px;

    --t-xxs: 9px; --t-xs: 10px; --t-sm: 11px; --t-md: 12px;
    --t-lg: 14px; --t-xl: 18px; --t-2xl: 24px; --t-3xl: 36px;

    --rail-w: 152px;
    --row-h: 30px;       /* single phase row height */
    --row-pad: 4px;      /* lane top/bottom padding */
    --ms-row-h: 22px;    /* milestone single row */
    --ms-pad: 6px;
    --axis-h: 56px;

    --pad-x: var(--s-7);
  }

  @media (max-width: 720px) {
    :root { --pad-x: var(--s-4); --rail-w: 128px; }
  }
  @media (min-width: 1440px) {
    :root { --pad-x: var(--s-8); }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  html { background: var(--paper); }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    font-size: var(--t-md);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .page {
    width: 100%;
    margin: 0 auto;
    padding: var(--s-7) var(--pad-x) var(--s-9);
  }

  /* ══════════════════════════════════════════════════
     HEADER
     ══════════════════════════════════════════════════ */
  .doc-header {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: var(--s-5);
    align-items: baseline;
    padding-bottom: var(--s-7);
  }
  .doc-header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: var(--t-3xl);
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .doc-clock {
    font-family: 'DM Mono', monospace;
    font-size: var(--t-lg);
    color: var(--ink);
    letter-spacing: 0.04em;
  }
  .doc-clock .time { color: var(--mute-soft); margin-left: 6px; }

  /* ══════════════════════════════════════════════════
     STICKY TOOLBAR
     ══════════════════════════════════════════════════ */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    padding: var(--s-4) 0;
    margin-bottom: var(--s-7);
  }
  .t-row {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: var(--s-5);
    row-gap: var(--s-3);
  }
  .t-spacer { flex: 1; min-width: var(--s-4); }
  .t-input { display: inline-flex; align-items: baseline; gap: var(--s-2); }
  .t-label {
    font-size: var(--t-xxs);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mute);
    font-weight: 500;
  }

  .tool-input {
    font-family: 'DM Mono', monospace;
    font-size: var(--t-sm);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--ink);
    padding: 4px 2px 3px;
    color: var(--ink);
    border-radius: 0;
    letter-spacing: 0.02em;
    min-width: 120px;
  }
  .tool-input:focus { outline: none; border-bottom-color: var(--accent); }
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: opacity(0.45) grayscale(1);
    cursor: pointer;
  }
  input[type="date"]::-webkit-calendar-picker-indicator:hover {
    filter: opacity(0.9) grayscale(1);
  }

  .link {
    font-family: 'DM Mono', monospace;
    font-size: var(--t-sm);
    background: none;
    border: none;
    color: var(--ink);
    cursor: pointer;
    padding: 2px 0 3px;
    border-bottom: 1px solid currentColor;
    letter-spacing: 0.04em;
    font-weight: 500;
    transition: color 0.1s, border-bottom-color 0.1s;
  }
  .link:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .link.muted {
    color: var(--mute);
    font-weight: 400;
    border-bottom-color: var(--rule);
  }
  .link.muted:hover { color: var(--ink); border-bottom-color: var(--ink); }
  .link.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .link.active:hover { color: var(--ink); border-bottom-color: var(--ink); }

  .save-indicator {
    font-size: var(--t-xs);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mute-soft);
    transition: color 0.2s;
    font-weight: 500;
  }
  .save-indicator.flash { color: var(--accent); }

  /* Zoom cluster — muted −/level/+/FIT, sits right of the spacer. */
  .zoom-cluster {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    padding: 0 2px;
    border: 1px solid var(--rule);
    background: var(--paper);
    user-select: none;
  }
  .zoom-btn {
    font-family: 'DM Mono', monospace;
    font-size: var(--t-xs);
    line-height: 1;
    background: transparent;
    border: none;
    color: var(--mute);
    cursor: pointer;
    padding: 4px 7px;
    letter-spacing: 0.06em;
    font-weight: 500;
    transition: color 0.08s, background 0.08s;
  }
  .zoom-btn:hover { color: var(--accent); background: rgba(255, 74, 2, 0.04); }
  .zoom-btn.zoom-fit {
    border-left: 1px solid var(--rule-hair);
    font-size: 10px;
    letter-spacing: 0.14em;
  }
  .zoom-level {
    font-family: 'DM Mono', monospace;
    font-size: var(--t-xxs);
    letter-spacing: 0.1em;
    color: var(--ink);
    min-width: 28px;
    text-align: center;
    font-weight: 600;
  }

  /* ══════════════════════════════════════════════════
     TIMELINE
     ══════════════════════════════════════════════════ */
  .tl {
    position: relative;
    width: 100%;
    user-select: none;
    overflow-x: auto;
    overflow-y: hidden;
    /* Subtle, DM-Mono-era scrollbar */
    scrollbar-width: thin;
    scrollbar-color: var(--rule) transparent;
  }
  .tl::-webkit-scrollbar { height: 8px; }
  .tl::-webkit-scrollbar-track { background: transparent; }
  .tl::-webkit-scrollbar-thumb {
    background: var(--rule);
    border-radius: 4px;
  }
  .tl::-webkit-scrollbar-thumb:hover { background: var(--mute); }

  .tl-buffer {
    position: absolute;
    top: 0;
    bottom: 0;
    background: var(--buffer-bg);
    z-index: 0;
    pointer-events: none;
  }

  /* AXIS — ruler style */
  .tl-axis {
    position: relative;
    height: var(--axis-h);
    border-bottom: 1px solid var(--ink);
    z-index: 2;
  }
  .day-tick {
    position: absolute;
    width: 1px;
    background: var(--rule-fine);
  }
  .day-tick.minor { top: 44px; bottom: 0; }
  .day-tick.quarter { top: 38px; bottom: 0; background: var(--rule); }
  .day-tick.week { top: 30px; bottom: 0; background: var(--mute); }
  .day-tick.month { top: 24px; bottom: 0; background: var(--ink); width: 1.5px; }
  .day-tick.in-buffer { opacity: 0.4; }

  /* Month labels live in the top band (y≈0–15); day numbers live in the
     middle band (y≈16–24). They used to share the same band and collide
     horizontally whenever a month name sat over days 2–4. */
  .day-num {
    position: absolute;
    top: 16px;
    font-size: var(--t-xxs);
    color: var(--mute);
    letter-spacing: 0.05em;
    transform: translateX(-50%);
    white-space: nowrap;
    font-weight: 500;
  }
  .day-num.week { color: var(--ink); font-weight: 600; }
  .day-num.month { color: var(--ink); font-weight: 700; font-size: var(--t-xs); }
  .day-num.in-buffer { color: var(--mute-soft); font-weight: 400; opacity: 0.75; }

  .month-label {
    position: absolute;
    top: 0;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--ink);
    transform: translateX(8px);
    white-space: nowrap;
    line-height: 1;
    letter-spacing: 0.01em;
    pointer-events: none;
  }
  .month-label.in-buffer { color: var(--mute-soft); }

  /* MILESTONES — distinct strip with stacking */
  .tl-milestones {
    position: relative;
    border-bottom: 1px solid var(--ink);
    background: var(--paper);
    z-index: 2;
  }
  .tl-milestone {
    position: absolute;
    height: var(--ms-row-h);
    display: flex;
    align-items: center;
    cursor: pointer;
    z-index: 3;
    touch-action: none;
  }
  body.edit-mode .tl-milestone { cursor: grab; }
  body.edit-mode .tl-milestone:active { cursor: grabbing; }
  .m-dot {
    width: 9px;
    height: 9px;
    background: var(--accent);
    transform: rotate(45deg);
    margin-left: -4.5px;
    flex-shrink: 0;
    transition: transform 0.08s;
    pointer-events: none;
  }
  .tl-milestone:hover .m-dot { transform: rotate(45deg) scale(1.3); }
  .tl-milestone.soft .m-dot {
    background: var(--paper);
    border: 1.5px solid var(--accent);
  }
  .m-text {
    margin-left: 10px;
    font-size: var(--t-sm);
    white-space: nowrap;
    letter-spacing: 0.04em;
    pointer-events: none;
  }
  .m-day { color: var(--mute); font-weight: 500; }
  .m-sep { color: var(--mute-soft); margin: 0 5px; }
  .m-label { color: var(--ink); font-weight: 500; }
  .tl-milestone:not(.soft) .m-label { font-weight: 600; }
  .tl-milestone.dragging { z-index: 10; }
  .tl-milestone.dragging .m-dot { transform: rotate(45deg) scale(1.5); }

  /* Milestone inline editor — in-place swap of .m-text */
  .tl-milestone.editing {
    z-index: 12;
    overflow: visible;
    cursor: default;
  }
  body.edit-mode .tl-milestone.editing,
  body.edit-mode .tl-milestone.editing:active {
    cursor: default;
  }
  .m-edit {
    display: inline-flex;
    align-items: center;
    gap: var(--s-2);
    margin-left: 10px;
    font-size: var(--t-sm);
    white-space: nowrap;
  }
  .ms-label-input {
    border: none;
    background: transparent;
    outline: none;
    font: inherit;
    font-family: 'DM Mono', monospace;
    font-size: var(--t-sm);
    letter-spacing: 0.04em;
    color: var(--ink);
    padding: 1px 2px;
    min-width: 80px;
    width: 160px;
    border-bottom: 1px solid var(--accent);
    caret-color: var(--accent);
  }
  .ms-date-input {
    border: none;
    background: transparent;
    outline: none;
    font-family: 'DM Mono', monospace;
    font-size: var(--t-xs);
    color: var(--mute);
    padding: 1px 2px;
    border-bottom: 1px solid var(--rule);
    min-width: 96px;
  }
  .ms-date-input:focus { border-bottom-color: var(--accent); color: var(--ink); }
  .ms-soft-chip {
    border: 1px solid var(--ink-soft);
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    font-size: var(--t-xs);
    line-height: 1;
    padding: 2px 5px;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.08s, color 0.08s;
  }
  .ms-soft-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .ms-soft-chip.hard {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .ms-delete {
    border: 1px solid var(--rule-hair);
    background: var(--paper);
    color: var(--mute);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 3px 8px 4px;
    transition: color 0.08s, border-color 0.08s, background 0.08s;
    min-width: 22px;
    min-height: 22px;
  }
  .ms-delete:hover { color: var(--accent); border-color: var(--accent); background: rgba(255, 74, 2, 0.06); }

  /* VERTICALS */
  .tl-vertical {
    position: absolute;
    top: 0;
    bottom: 0;
    z-index: 4;
    pointer-events: none;
  }
  .tl-start { width: 1.5px; background: var(--ink); }
  .tl-horizon {
    width: 2px;
    background: var(--ink);
  }
  .tl-horizon::after {
    content: 'HORIZON';
    position: absolute;
    bottom: 12px;
    left: 8px;
    font-size: var(--t-xxs);
    letter-spacing: 0.18em;
    color: var(--ink);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-weight: 600;
  }
  .tl-today {
    width: 1px;
    background: var(--accent);
    opacity: 0.85;
  }
  .tl-today::before {
    content: '';
    position: absolute;
    top: -3px;
    left: -2.5px;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  .tl-scrub {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--ink);
    z-index: 6;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.08s, background 0.08s, width 0.08s;
  }
  body.edit-mode .tl-scrub.show { opacity: 0.65; }
  .tl-scrub.active {
    opacity: 1 !important;
    background: var(--accent);
    width: 2px;
  }
  .tl-scrub.active::before {
    content: '';
    position: absolute;
    top: -4px;
    left: -3.25px;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }
  .tl-scrub-tag {
    position: absolute;
    top: 4px;
    left: 6px;
    font-size: var(--t-xxs);
    letter-spacing: 0.12em;
    background: var(--paper);
    color: var(--ink);
    padding: 2px 5px;
    font-weight: 600;
    border: 1px solid var(--ink);
    white-space: nowrap;
    transition: color 0.08s, border-color 0.08s;
  }
  .tl-scrub.active .tl-scrub-tag {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Phases/milestones highlight as scrub passes through them */
  .bar.scrub-hit {
    box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--accent);
    z-index: 4;
  }
  .tl-milestone.scrub-hit .m-dot {
    transform: rotate(45deg) scale(1.4);
  }

  /* Crosshair cursor on scrubbable zones (axis + track lanes) */
  body.edit-mode .tl-tracks,
  body.edit-mode .tl-axis { cursor: ew-resize; }
  /* Milestones lane: click-to-plant, so show a plant/add cursor */
  body.edit-mode .tl-milestones { cursor: copy; }
  body.edit-mode .tl-axis:hover,
  body.edit-mode .tl-milestones:hover { background: rgba(255, 74, 2, 0.015); }

  /* TRACKS WRAPPER */
  .tl-tracks {
    position: relative;
  }

  /* RAIL — sticky overlay */
  .tl-rail {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--rail-w);
    z-index: 5;
    background: var(--paper);
    border-right: 1px solid var(--rule-hair);
  }
  .tl-rail .rail-cell {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: var(--row-pad) var(--s-4) var(--row-pad) var(--s-2);
    border-bottom: 1px solid var(--rule-hair);
    background: var(--paper);
  }
  .tl-rail .rail-cell .track-label-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  body.edit-mode .tl-rail .rail-cell .track-label-wrap { cursor: pointer; }
  body.edit-mode .tl-rail .rail-cell .track-label-wrap:hover .name { color: var(--accent); }
  .track-cat { display: none; } /* deprecated — replaced by .track-dot */
  .track-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ink);
    flex-shrink: 0;
    align-self: center;
    margin-right: 2px;
  }
  .name-line {
    display: flex;
    align-items: center;
    gap: var(--s-1);
    line-height: 1.2;
  }
  .name-line .sub { margin-left: var(--s-1); align-self: baseline; }
  .name {
    font-size: var(--t-sm);
    font-weight: 600;
    color: var(--ink);
    transition: color 0.1s;
  }
  .sub {
    font-size: var(--t-xxs);
    color: var(--mute);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .tl-rail .rail-add-track {
    height: 32px;
    display: none;
    align-items: center;
    justify-content: flex-end;
    padding-right: var(--s-4);
    font-size: var(--t-xxs);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mute);
    cursor: pointer;
    border-bottom: 1px solid var(--rule-hair);
    font-weight: 500;
    background: var(--paper);
  }
  body.edit-mode .tl-rail .rail-add-track { display: flex; }
  .tl-rail .rail-add-track:hover { color: var(--accent); }

  /* Inline editor — shared shape for track add + edit. Sits inside
     .track-label-wrap or inside .rail-add-track.editing.  */
  .track-inline {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
  }
  .track-inline .ti-name-row,
  .track-inline .ti-sub-row {
    display: flex;
    align-items: center;
    gap: var(--s-1);
  }
  .track-inline .ti-sub-row { gap: 6px; }
  .track-dot-btn {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: none;
    padding: 0;
    background: var(--ink);
    cursor: pointer;
    flex-shrink: 0;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .track-dot-btn:hover { transform: scale(1.2); box-shadow: 0 0 0 2px rgba(255,74,2,0.25); }
  .track-name-input,
  .track-sub-input {
    border: none;
    background: transparent;
    outline: none;
    text-align: right;
    padding: 0;
    font-family: inherit;
    color: inherit;
  }
  .track-name-input {
    font-size: var(--t-sm);
    font-weight: 600;
    color: var(--ink);
    width: 130px;
    letter-spacing: 0.01em;
  }
  .track-name-input::placeholder { color: var(--mute-soft); font-weight: 500; }
  .track-sub-input {
    font-size: var(--t-xxs);
    color: var(--mute);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    width: 100px;
  }
  .track-sub-input::placeholder { color: var(--mute-soft); }
  .track-seq-chip {
    font-size: var(--t-xxs);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 1px 5px 2px;
    border: 1px solid var(--rule-hair);
    border-radius: 2px;
    background: var(--paper);
    color: var(--mute);
    cursor: pointer;
    user-select: none;
    font-weight: 500;
  }
  .track-seq-chip.on {
    border-color: var(--accent);
    color: var(--accent);
  }
  .track-delete {
    background: var(--paper);
    border: 1px solid var(--rule-hair);
    color: var(--mute);
    font-size: 16px;
    line-height: 1;
    padding: 2px 7px 3px;
    cursor: pointer;
    min-width: 22px;
    min-height: 22px;
    transition: color 0.08s, border-color 0.08s, background 0.08s;
  }
  .track-delete:hover { color: var(--accent); border-color: var(--accent); background: rgba(255, 74, 2, 0.06); }

  /* When the +Track row is in edit mode, it gets the same footprint as a track cell. */
  .tl-rail .rail-add-track.editing {
    height: auto;
    padding: var(--row-pad) var(--s-4) var(--row-pad) var(--s-2);
    align-items: flex-end;
    cursor: default;
    text-transform: none;
    letter-spacing: normal;
    font-weight: 500;
    color: var(--ink);
  }
  .tl-rail .rail-add-track.editing:hover { color: var(--ink); }

  /* LANES — height set inline based on row count */
  .tl-lane {
    position: relative;
    border-bottom: 1px solid var(--rule-hair);
    background: transparent;
  }
  .tl-lane:last-of-type { border-bottom: 1px solid var(--ink); }

  /* BARS */
  .bar {
    position: absolute;
    height: 22px;
    padding: 0 var(--s-2);
    display: flex;
    align-items: center;
    font-size: var(--t-xxs);
    letter-spacing: 0.04em;
    overflow: hidden;
    white-space: nowrap;
    cursor: pointer;
    z-index: 1;
    font-weight: 500;
    touch-action: none;
    transition: box-shadow 0.08s;
  }
  body.edit-mode .bar { cursor: grab; }
  body.edit-mode .bar:active { cursor: grabbing; }
  .bar:hover {
    z-index: 4;
    box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--accent);
  }
  .bar.dragging {
    opacity: 0.85;
    z-index: 10;

  }
  .bar.committed {
    border: 1px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
  }
  .bar.active {
    border: 1px solid var(--accent);
    background: var(--accent);
    color: var(--paper);
    font-weight: 600;
  }
  .bar.tentative {
    border: 1px dashed var(--mute);
    background: var(--paper);
    color: var(--mute);

  .bar.waiting {

  .bar.beyond {
    border: 1px dotted var(--mute);
    background: var(--paper);
    color: var(--mute);
    font-style: italic;
  }
  .bar .ix {
    font-weight: 600;
    margin-right: var(--s-1);
    opacity: 0.6;
  }

  /* Inline phase editor — bar transforms into an editable row in place. */
  .bar.editing {
    overflow: visible;
    z-index: 6;

  body.edit-mode .bar.editing,
  body.edit-mode .bar.editing:active { cursor: default; }

  .phase-state-chip {

  .phase-label-input {

    font-family: inherit;

    letter-spacing: 0.04em;
    font-weight: inherit;
    padding: 0;
  }

  .phase-ix-input {
    width: 26px;
    background: transparent;
    border: none;
    outline: none;

    font-family: inherit;
    font-size: var(--t-xxs);
    font-weight: 600;
    text-align: right;
    padding: 0;

  /* Floating panel above the bar in edit mode — hosts the start/days inputs.
     Lives in the bar so it inherits editing state & co-commits on focusout. */
  .phase-edit-detail {
    position: absolute;
    top: -34px;
    left: 0;

    align-items: center;
    gap: 6px;
    background: var(--paper);

  }
  .phase-edit-detail .pe-lbl {
    color: var(--mute);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-size: 9px;
    font-weight: 600;
  }
  .phase-edit-detail input {
    background: transparent;
    border: none;
    outline: none;
    font: inherit;
    font-family: 'DM Mono', monospace;
    color: var(--ink);
    padding: 1px 2px;
    border-bottom: 1px solid var(--rule);
    caret-color: var(--accent);
  }
  .phase-edit-detail input:focus { border-bottom-color: var(--accent); }
  .phase-edit-detail .pe-date { width: 112px; }
  .phase-edit-detail .pe-days { width: 46px; text-align: right; }
  .phase-edit-detail .pe-sep { color: var(--mute-soft); padding: 0 2px; }

  .phase-delete {
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(0, 0, 0, 0.25);
    color: #1a1a1a;
    opacity: 0.85;
    font-size: 15px;
    line-height: 1;
    padding: 2px 6px 3px;
    cursor: pointer;
    flex-shrink: 0;
    min-width: 22px;
    transition: opacity 0.08s, background 0.08s;
  }
  .phase-delete:hover { opacity: 1; background: #fff; }

  .paint-bar {
    position: absolute;
    height: 22px;
    background: var(--accent);
    opacity: 0.25;
    border: 1px dashed var(--accent);
    pointer-events: none;
    z-index: 8;
  }

  body.edit-mode .bar::before,
  body.edit-mode .bar::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 6px;
    cursor: ew-resize;
    z-index: 2;
  }
  body.edit-mode .bar::before { left: 0; }
  body.edit-mode .bar::after { right: 0; }
  body.edit-mode .bar:hover::before {
    border-left: 2px solid var(--ink);
    background: linear-gradient(to right, rgba(255, 74, 2, 0.15), transparent);
  }
  body.edit-mode .bar:hover::after {
    border-right: 2px solid var(--ink);
    background: linear-gradient(to left, rgba(255, 74, 2, 0.15), transparent);
  }
  body.edit-mode .bar.active:hover::before { border-left-color: var(--paper); }
  body.edit-mode .bar.active:hover::after { border-right-color: var(--paper); }

  .drag-tip {
    position: fixed;
    z-index: 200;
    background: var(--ink);
    color: var(--paper);
    padding: 6px 10px;
    font-size: var(--t-xxs);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    pointer-events: none;
    font-weight: 600;
    display: none;
    white-space: nowrap;
  }
  .drag-tip.show { display: block; }
  .drag-tip .sep { color: var(--mute-soft); margin: 0 6px; }
  .drag-tip .accent { color: var(--accent); }

  /* ══════════════════════════════════════════════════
     POPOVER
     ══════════════════════════════════════════════════ */
  .pop-scrim {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 10, 0.45);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: var(--s-4);
  }
  .pop-scrim.open { display: flex; }
  .popover {
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: var(--s-5) var(--s-5) var(--s-4);

    max-width: 100%;
    box-shadow: 6px 6px 0 rgba(10, 10, 10, 0.1);
  }
  .popover .pop-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;

  }
  .popover .pop-title {
    font-family: 'Instrument Serif', serif;

  }
  .popover .pop-kind {

  .popover .field {

  .popover .field label {

  }
  .popover .field input,
  .popover .field select,
  .popover .field textarea {
    font-family: 'DM Mono', monospace;
    font-size: var(--t-sm);

    color: var(--ink);

  }
  .popover .field input:focus,
  .popover .field select:focus,
  .popover .field textarea:focus { outline: none; border-color: var(--ink); }
  .popover .field .check {
    display: flex;
    align-items: center;
    gap: var(--s-2);
    font-size: var(--t-sm);
  }
  .popover .field .color-field {
    display: flex;
    align-items: center;
    gap: var(--s-2);
  }
  .popover .field .color-field input[type="color"] {
    width: 38px;
    height: 28px;
    padding: 2px;
    border: 1px solid var(--rule);
    background: var(--paper);
    cursor: pointer;
    flex-shrink: 0;
  }
  .popover .field .color-field .color-swatch-label {
    font-family: 'DM Mono', monospace;
    font-size: var(--t-xs);
    color: var(--mute);
    letter-spacing: 0.04em;
  }
  .popover .field .hint {
    font-size: var(--t-xxs);
    color: var(--mute-soft);
    letter-spacing: 0.05em;
    margin-top: 4px;
  }
  .popover .pop-actions {
    display: flex;
    gap: var(--s-3);
    margin-top: var(--s-4);
    padding-top: var(--s-3);
    border-top: 1px solid var(--rule);
    align-items: baseline;
  }
  .popover .pop-actions .link.danger {
    color: var(--accent);
    margin-left: auto;
  }
  .popover .pop-actions .link.danger:hover { color: var(--ink); border-bottom-color: var(--ink); }

  /* PUNCH SHEET */
  .ledger { margin-top: var(--s-9); }
  .week-group { margin-bottom: var(--s-7); }
  .week-head {
    display: flex;
    align-items: baseline;
    gap: var(--s-3);
    padding-bottom: var(--s-2);
    margin-bottom: var(--s-3);
    border-bottom: 1px solid var(--ink);
  }
  .week-head .wnum {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 28px;
    color: var(--ink);
    line-height: 1;
  }
  .week-head .wlabel {
    font-size: var(--t-xs);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mute);
    font-weight: 500;
  }
  .week-head .wdates {
    margin-left: auto;
    font-size: var(--t-xs);
    color: var(--mute);
    letter-spacing: 0.1em;
  }
  .week-head .link {
    margin-left: var(--s-3);
    display: none;
    font-size: var(--t-xxs);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  body.edit-mode .week-head .link { display: inline-block; }
  .row {
    display: grid;
    grid-template-columns: 108px 1fr 220px;
    gap: var(--s-4);
    padding: var(--s-3) 0;
    border-bottom: 1px solid var(--rule-hair);
    align-items: baseline;
  }
  body.edit-mode .row { cursor: pointer; }
  body.edit-mode .row:hover { background: var(--hover); }
  .row:last-child { border-bottom: none; }
  .row .tag {
    font-size: var(--t-xxs);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mute);
    font-weight: 600;
  }
  .row .task { color: var(--ink); line-height: 1.55; font-size: var(--t-md); }
  .row .route {
    text-align: right;
    font-size: var(--t-xs);
    color: var(--mute);
    letter-spacing: 0.04em;
  }
  .row .route:not(:empty)::before { content: '→ '; color: var(--mute-soft); }
  .row.blocked .tag { color: var(--accent); }
  .row.blocked .task::before { content: '▲ '; color: var(--accent); font-size: 9px; margin-right: 2px; }
  .row.decision .task::before { content: '◆ '; color: var(--ink); margin-right: 2px; }

  /* Inline task composer / editor — fluid, no modal.
     Shared by beginAddTask() and beginEditTask(): same grid as .row so tag/text/route
     line up with non-editing rows, plus an absolute-positioned control group on the right. */
  .row.row-inline {
    background: var(--hover);
    box-shadow: inset 2px 0 0 var(--accent);
    cursor: default !important;
    padding: var(--s-2) 72px var(--s-2) var(--s-3);
    position: relative;
  }
  body.edit-mode .row.row-inline:hover { background: var(--hover); }
  body.edit-mode .row.row-inline { cursor: default; }
  .row.row-inline input {
    font-family: 'DM Mono', monospace;
    font-size: var(--t-md);
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--mute-soft);
    padding: 3px 2px 3px;
    color: var(--ink);
    letter-spacing: 0.02em;
    width: 100%;
    border-radius: 0;
  }
  .row.row-inline input:focus {
    outline: none;
    border-bottom-color: var(--accent);
    border-bottom-style: solid;
  }
  .row.row-inline input.inline-tag {
    font-size: var(--t-xxs);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--mute);
  }
  .row.row-inline input.inline-route {
    text-align: right;
    font-size: var(--t-xs);
    color: var(--mute);
  }
  .row.row-inline input::placeholder { color: var(--mute-soft); font-style: italic; }
  .row.row-inline input.inline-tag::placeholder { font-style: normal; letter-spacing: 0.15em; }

  .row.row-inline .inline-controls {
    position: absolute;
    right: var(--s-2);
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .type-chip {
    width: 22px;
    height: 22px;
    border: 1px solid var(--rule);
    background: var(--paper);
    font-family: 'DM Mono', monospace;
    font-size: var(--t-xs);
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
    color: var(--mute);
    font-weight: 600;
    border-radius: 0;
    transition: color 0.1s, border-color 0.1s, background 0.1s;
    letter-spacing: 0;
  }
  .type-chip:hover { color: var(--ink); border-color: var(--ink); }
  .type-chip[data-type="decision"] { color: var(--ink); border-color: var(--ink); }
  .type-chip[data-type="blocked"] {
    color: var(--paper);
    border-color: var(--accent);
    background: var(--accent);
  }
  .inline-delete {
    background: transparent;
    border: none;
    padding: 0 2px;
    color: var(--mute-soft);
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    transition: color 0.1s;
  }
  .inline-delete:hover { color: var(--accent); }

  /* Mini track color dot next to a task's tag — visual IA link between task.tag and track.name */
  .row .tag .tag-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: 2px;
  }

  /* Week group with no tasks yet — still shows header + add affordance */
  .week-group.week-empty .week-head { border-bottom-color: var(--rule-hair); }
  .week-group.week-empty .week-head .wnum,
  .week-group.week-empty .week-head .wlabel { color: var(--mute); }
  .week-group.week-empty .empty-hint {
    padding: var(--s-3) 0;
    font-size: var(--t-xs);
    color: var(--mute-soft);
    letter-spacing: 0.04em;
    border-bottom: 1px dashed var(--rule-hair);
  }
  body.edit-mode .week-group.week-empty .empty-hint::after {
    content: ' — click + Task to begin';
    color: var(--mute-soft);
  }

  /* Inline token row — replaces prompt() */
  .token-row {
    display: none;
    align-items: baseline;
    gap: var(--s-3);
    padding: var(--s-3) 0 var(--s-2);
    border-top: 1px dashed var(--rule-hair);
    margin-top: var(--s-3);
  }
  .token-row.open { display: flex; flex-wrap: wrap; }
  .token-row .token-hint {
    font-size: var(--t-xxs);
    color: var(--mute);
    letter-spacing: 0.04em;
    line-height: 1.4;
  }
  .token-row input.token-input {
    flex: 1;
    min-width: 240px;
    font-family: 'DM Mono', monospace;
    font-size: var(--t-sm);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--ink);
    padding: 4px 2px 3px;
    color: var(--ink);
  }
  .token-row input.token-input:focus { outline: none; border-bottom-color: var(--accent); }
  .token-row .token-current { color: var(--mute); font-size: var(--t-xs); }

  /* Two-step reset: button transforms instead of using confirm() */
  .link.confirming {
    color: var(--accent);
    border-bottom-color: var(--accent);
    animation: pulseConfirm 0.6s ease-out;
  }
  @keyframes pulseConfirm {
    0%   { opacity: 0.4; }
    100% { opacity: 1; }
  }

  /* Add-task "+ Task" hint slot — always present in edit-mode */
  .add-task-line {
    display: none;
    padding: var(--s-3) 0;
    border-bottom: 1px dashed var(--rule-hair);
  }
  body.edit-mode .add-task-line { display: block; }
  .add-task-line .link {
    font-size: var(--t-xxs);
    letter-spacing: 0.15em;
    color: var(--mute);
    border-bottom: 1px dashed var(--mute-soft);
  }
  .add-task-line .link:hover { color: var(--accent); border-bottom-color: var(--accent); }

  @media (max-width: 720px) {
    .doc-header { grid-template-columns: 1fr; gap: var(--s-2); padding-bottom: var(--s-5); }
    .doc-header h1 { font-size: 28px; }
    .doc-clock { font-size: var(--t-md); }
    .row { grid-template-columns: 80px 1fr; padding: var(--s-3) 0; }
    .row .route { grid-column: 2; text-align: left; padding-top: 2px; }
    .row.row-inline { padding-right: 60px; }
    .row.row-inline input.inline-route { grid-column: 2; text-align: left; }
    .popover .field { grid-template-columns: 1fr; gap: var(--s-1); }
    .token-row input.token-input { min-width: 0; width: 100%; }
  }
</style>
</head>
<body class="edit-mode">

<script>
/* ════════════════════════════════════════════════════
   STATE
   ════════════════════════════════════════════════════ */

const STORAGE_KEY = 'time-aligns-v10';
const VISIBLE_BUFFER_DAYS = 14;
const MIN_PX_PER_DAY = 4;
const PAINT_MIN_DAYS = 1;
const ROW_H = 30;        // single phase row
const ROW_PAD = 4;       // top/bottom padding inside lane
const MS_ROW_H = 22;
const MS_PAD = 6;
const MS_MIN_LABEL_PX = 68;
// DM Mono at 11px ≈ 6.6px/char. Milestone width ≈ dot+margin + day(2ch)
// + sep(· with margins) + label chars + trailing gap so neighbors breathe.
const MS_CHAR_PX = 6.6;
const MS_FIXED_PX = 9 /* dot */ + 10 /* dot→text margin */
                  + 13 /* 2-digit day */ + 17 /* · + 5px each side */;
const MS_TRAIL_PX = 16; // breathing room to the next milestone
function msWidthPx(label) {
  const txtPx = Math.max(1, String(label || '').length) * MS_CHAR_PX;
  return MS_FIXED_PX + txtPx + MS_TRAIL_PX;
}

/* ════════════════════════════════════════════════════
   GITHUB-BACKED PERSISTENCE
   State is stored as state.json in a GitHub repo.
   Reads: public if repo is public, otherwise need token.
   Writes: PUT via Contents API with a Personal Access
   Token stored in this browser's localStorage. On SHA
   conflict we re-pull and surface the collision.
   ════════════════════════════════════════════════════ */
const GH_REPO   = 'jalulia/timeline';
const GH_FILE   = 'state.json';
const GH_BRANCH = 'main';
const TOKEN_KEY = 'time-aligns-gh-token';
const CACHE_KEY = 'time-aligns-cache-v1';
let currentSha = null;

function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
function setToken(t) {
  if (t) localStorage.setItem(TOKEN_KEY, t);
  else   localStorage.removeItem(TOKEN_KEY);
}
function authHeaders() {
  const t = getToken();
  return t ? { 'Authorization': 'token ' + t } : {};
}

const uid = () => Math.random().toString(36).slice(2, 9);
const toISO = (d) => {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
};
const fromISO = (s) => { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); };
const addDays = (d, n) => { const c = new Date(d); c.setDate(c.getDate() + n); return c; };
const daysBetween = (a, b) => Math.round((fromISO(b) - fromISO(a)) / 86400000);
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const fmtShort = (iso) => { const d = fromISO(iso); return `${d.getDate()} ${MONTHS[d.getMonth()]}`; };

/* Minimal starter state — a single example milestone, no tracks, no tasks.
   New users get a clean page; they discover by clicking the milestone, the
   +Track affordance in the rail, and the +Milestone button in the toolbar.
   Reset button returns the app to this exact state. */
const SEED = {
  startDate: '2026-04-17',
  horizonDate: '2026-05-31',
  tracks: [],
  milestones: [
    { id: uid(), label: 'click here to edit', date: '2026-05-01', soft: true }
  ],
  tasks: []
};

let state = JSON.parse(JSON.stringify(SEED));
let editMode = true;

/* Zoom: multiplier on the "fit" ppd. 1× = horizon fits in page; 8× = dense zoom in.
   Cursor-anchored wheel (Cmd/Ctrl+wheel) and muted −/1×/+/FIT cluster in toolbar. */
let zoomFactor = 1;
const ZOOM_MIN = 1;
const ZOOM_MAX = 8;
const ZOOM_STEP = 1.25;          // multiplicative per wheel tick / button press
let saveTimer = null;

function realToday() { return toISO(new Date()); }

const history = [];
const HISTORY_LIMIT = 60;
function snapshot() { history.push(JSON.stringify(state)); if (history.length > HISTORY_LIMIT) history.shift(); }
function undo() {
  if (history.length < 2) { flashSave('Nothing to undo'); return; }
  history.pop();
  state = JSON.parse(history[history.length - 1]);
  syncInputs(); render(); persistOnly();
  flashSave('Undone');
}

const saveEl = document.getElementById('save-indicator');
let flashTimer = null;
function flashSave(text) {
  saveEl.textContent = text;
  saveEl.classList.add('flash');
  if (flashTimer) clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { saveEl.classList.remove('flash'); saveEl.textContent = 'Saved'; }, 800);
}

async function loadState() {
  // Try GitHub first; fall back to local cache so the page still renders offline.
  try {
    const url = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}&t=${Date.now()}`;
    const r = await fetch(url, { headers: authHeaders(), cache: 'no-store' });
    if (r.status === 404) {
      // state.json doesn't exist yet — first ever run against a fresh repo.
      currentSha = null;
      flashSave('New repo');
      return;
    }
    if (!r.ok) throw new Error('load ' + r.status);
    const data = await r.json();
    currentSha = data.sha;
    const json = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    const parsed = JSON.parse(json);
    if (parsed && parsed.tracks && parsed.milestones && parsed.tasks) {
      state = parsed;
      localStorage.setItem(CACHE_KEY, json);
      flashSave('Synced');
    }
  } catch (e) {
    console.warn('GitHub load failed, trying cache', e);
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) { try { state = JSON.parse(cached); flashSave('Offline'); } catch (err) {} }
    else { flashSave('Offline · seed'); }
  }
}

async function persistNow() {
  const token = getToken();
  if (!token) { flashSave('Need token'); return false; }
  const json = JSON.stringify(state, null, 2);
  localStorage.setItem(CACHE_KEY, json);
  const body = {
    message: 'update timeline ' + new Date().toISOString(),
    content: btoa(unescape(encodeURIComponent(json))),
    branch: GH_BRANCH,
  };
  if (currentSha) body.sha = currentSha;
  try {
    flashSave('Saving…');
    const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      method: 'PUT',
      headers: { ...authHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (r.status === 409 || r.status === 422) {
      flashSave('Out of date — pulling');
      await loadState(); syncInputs(); render();
      return false;
    }
    if (r.status === 401 || r.status === 403) { flashSave('Auth failed'); return false; }
    if (!r.ok) throw new Error('save ' + r.status);
    const data = await r.json();
    currentSha = data.content.sha;
    flashSave('Saved');
    return true;
  } catch (e) {
    console.warn('save failed', e);
    flashSave('Save failed');
    return false;
  }
}

function persistOnly() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(persistNow, 800); // debounce so a drag doesn't spam commits
}

function saveState() { snapshot(); persistOnly(); flashSave('Queued'); }

/* ════════════════════════════════════════════════════
   GEOMETRY
   ════════════════════════════════════════════════════ */

const RAIL_W_NORMAL = 152, RAIL_W_NARROW = 128;
function getRailW() { return window.innerWidth <= 720 ? RAIL_W_NARROW : RAIL_W_NORMAL; }

let _geom = null;
function recomputeGeometry() {
  const tlEl = document.getElementById('tl-root');
  const padX = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--pad-x')) || 48;
  const pageInnerW = (tlEl ? tlEl.clientWidth : (window.innerWidth - padX * 2));
  const railW = getRailW();
  const workingDays = Math.max(1, daysBetween(state.startDate, state.horizonDate) + 1);

  let ppd = (pageInnerW - railW) / (workingDays + 2 * VISIBLE_BUFFER_DAYS);
  if (ppd < MIN_PX_PER_DAY) ppd = MIN_PX_PER_DAY;
  // Apply zoom factor after the fit-to-page clamp so 1× always fits.
  ppd = ppd * zoomFactor;
  ppd = Math.floor(ppd * 100) / 100;

  const railBufferDays = railW / ppd;
  const totalLeftBufferDays = railBufferDays + VISIBLE_BUFFER_DAYS;
  const viewStart = toISO(addDays(fromISO(state.startDate), -Math.ceil(totalLeftBufferDays)));
  const viewEnd   = toISO(addDays(fromISO(state.horizonDate),  VISIBLE_BUFFER_DAYS));
  const totalViewDays = Math.max(1, daysBetween(viewStart, viewEnd) + 1);
  const totalWidth = totalViewDays * ppd;

  _geom = { ppd, viewStart, viewEnd, totalViewDays, totalWidth, railW, pageInnerW };
  return _geom;
}
function geom() { return _geom || recomputeGeometry(); }

function dayOffset(iso) { return daysBetween(geom().viewStart, iso); }
function xForDate(iso) { return dayOffset(iso) * geom().ppd; }
function dateFromX(x) {
  const days = Math.round(x / geom().ppd);
  return toISO(addDays(fromISO(geom().viewStart), days));
}
function isInBuffer(iso) {
  const d = fromISO(iso);
  return d < fromISO(state.startDate) || d > fromISO(state.horizonDate);
}

/* ─── ZOOM ──────────────────────────────────────────
   Zoom is orthogonal to state — we never persist the factor, we never mutate
   startDate/horizonDate. Rail stays pinned to the viewport's left edge via
   translateX(scrollLeft). Cursor-anchored wheel keeps the date under the
   cursor fixed on screen. */
function updateRailTransform() {
  const tlEl = document.getElementById('tl-root');
  if (!tlEl) return;
  const rail = tlEl.querySelector('.tl-rail');
  if (rail) rail.style.transform = `translateX(${tlEl.scrollLeft}px)`;
}

function updateZoomBadge() {
  const badge = document.getElementById('zoom-level');
  if (!badge) return;
  badge.textContent = zoomFactor === 1
    ? 'FIT'
    : (zoomFactor >= 10 ? Math.round(zoomFactor) : zoomFactor.toFixed(1)) + '×';
}

function clampZoom(z) { return Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z)); }

/* Apply a zoom around an anchor. anchor = { viewportX, date } or null for
   centered-on-viewport. Preserves the date under viewportX by adjusting
   scrollLeft after the new geometry is computed. */
function applyZoom(targetZoom, anchor) {
  const z = clampZoom(targetZoom);
  if (z === zoomFactor) { updateZoomBadge(); return; }
  const tlEl = document.getElementById('tl-root');
  if (!tlEl) { zoomFactor = z; updateZoomBadge(); return; }
  // Capture viewport-relative cursor x + date under cursor BEFORE changing zoom
  let anchorViewportX, anchorDate;
  if (anchor && anchor.date) {
    anchorViewportX = anchor.viewportX;
    anchorDate = anchor.date;
  } else {
    anchorViewportX = tlEl.clientWidth / 2;
    anchorDate = dateFromX(tlEl.scrollLeft + anchorViewportX);
  }
  zoomFactor = z;
  render();
  // After render, recompute scrollLeft so anchorDate stays under anchorViewportX
  const newAnchorContentX = xForDate(anchorDate);
  const desiredScroll = newAnchorContentX - anchorViewportX;
  const maxScroll = Math.max(0, tlEl.scrollWidth - tlEl.clientWidth);
  tlEl.scrollLeft = Math.max(0, Math.min(maxScroll, desiredScroll));
  updateRailTransform();
  updateZoomBadge();
}

function setZoom(target, anchor) { applyZoom(target, anchor); }
function zoomFit() { applyZoom(1, null); }

/* ════════════════════════════════════════════════════
   STACKING — assign rows to overlapping items
   ════════════════════════════════════════════════════ */

// Phases within a track: row = lowest index where this phase doesn't overlap
function assignPhaseRows(phases) {
  const sorted = [...phases].sort((a, b) =>
    fromISO(a.start) - fromISO(b.start) || a.days - b.days
  );
  const rowEnds = []; // per-row last end-date as Date
  const result = new Map();
  sorted.forEach(p => {
    const pStart = fromISO(p.start);
    const pEnd = addDays(pStart, p.days - 1);
    let row = 0;
    while (row < rowEnds.length && rowEnds[row] >= pStart) row++;
    rowEnds[row] = pEnd;
    result.set(p.id, row);
  });
  return { rowFor: result, rowCount: Math.max(1, rowEnds.length) };
}

// Milestones: stacking based on actual estimated label width.
// Long labels bump to a new row rather than getting truncated.
function assignMilestoneRows(milestones, ppd) {
  const sorted = [...milestones].sort((a, b) => fromISO(a.date) - fromISO(b.date));
  const rowEnds = []; // per-row right-pixel-edge (inclusive of trailing gap)
  const result = new Map();
  sorted.forEach(ms => {
    const x = dayOffset(ms.date) * ppd;
    const right = x + msWidthPx(ms.label);
    let row = 0;
    while (row < rowEnds.length && rowEnds[row] > x) row++;
    rowEnds[row] = right;
    result.set(ms.id, row);
  });
  return { rowFor: result, rowCount: Math.max(1, rowEnds.length) };
}

/* ════════════════════════════════════════════════════
   RULER AXIS — ticks every day, adaptive number density
   ════════════════════════════════════════════════════ */

function tickSpacing(ppd, pageInnerW) {
  const monthFrac = (30 * ppd) / pageInnerW;
  if (monthFrac >= 0.5)   return 1; // every day
  if (monthFrac >= 0.25)  return 2; // every other day
  if (monthFrac >= 0.125) return 4; // ~weekly-ish
  return 7;                          // every 7 days
}

/* ════════════════════════════════════════════════════
   CLOCK
   ════════════════════════════════════════════════════ */

function updateClock() {
  const now = new Date();
  document.getElementById('clock-date').textContent =
    `${MONTHS[now.getMonth()]} ${now.getDate()} ${now.getFullYear()}`;
  document.getElementById('clock-time').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

/* ════════════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════════════ */

function renderTimeline() {
  const root = document.getElementById('tl-root');
  recomputeGeometry();
  const g = geom();
  const tw = g.totalWidth;
  const ppd = g.ppd;
  const vStart = fromISO(g.viewStart);
  const vEnd   = fromISO(g.viewEnd);
  const todayIso = realToday();
  const td = g.totalViewDays;

  // Buffers
  const startWallX = xForDate(state.startDate);
  const horizonWallX = xForDate(state.horizonDate);
  const buffersHtml = `
    <div class="tl-buffer" style="left:0; width:${startWallX}px;"></div>
    <div class="tl-buffer" style="left:${horizonWallX + 2}px; width:${tw - horizonWallX - 2}px;"></div>
  `;

  // ── AXIS ─────────────────────────────────────────
  const spacing = tickSpacing(ppd, g.pageInnerW);

  let axisInner = '';
  for (let i = 0; i < td; i++) {
    const d = addDays(vStart, i);
    const iso = toISO(d);
    const off = i * ppd;
    const day = d.getDate();
    const inBuf = isInBuffer(iso);

    // Tick weight
    let tickClass = 'minor';
    if (day === 1) tickClass = 'month';
    else if (day === 8 || day === 15 || day === 22 || day === 29) tickClass = 'week';
    else if (day % 2 === 1 && spacing <= 4) tickClass = 'quarter';

    if (inBuf) tickClass += ' in-buffer';

    axisInner += `<div class="day-tick ${tickClass}" style="left:${off}px;"></div>`;

    // Number visibility
    let showNum = false;
    let numClass = '';
    if (day === 1) { showNum = true; numClass = 'month'; }
    else if (day === 8 || day === 15 || day === 22 || day === 29) {
      // always show quarter-anchors when spacing <= 7
      if (spacing <= 7) { showNum = true; numClass = 'week'; }
    }
    else if ((day - 1) % spacing === 0) { showNum = true; }

    if (showNum) {
      const numCls = `${numClass}${inBuf ? ' in-buffer' : ''}`;
      axisInner += `<div class="day-num ${numCls}" style="left:${off}px;">${day}</div>`;
    }
  }

  // Month labels
  let m = new Date(vStart.getFullYear(), vStart.getMonth(), 1);
  while (m <= vEnd) {
    const mIso = toISO(m < vStart ? vStart : m);
    const inBuf = isInBuffer(mIso);
    const monthName = m.toLocaleString('en', { month: 'long' });
    axisInner += `<div class="month-label ${inBuf ? 'in-buffer' : ''}" style="left:${dayOffset(mIso) * ppd}px;">${monthName}</div>`;
    m = new Date(m.getFullYear(), m.getMonth() + 1, 1);
  }

  const axisHtml = `<div class="tl-axis" style="width:${tw}px;">${axisInner}</div>`;

  // ── MILESTONES ──────────────────────────────────
  const msPlan = assignMilestoneRows(state.milestones, ppd);
  const msStripH = MS_PAD * 2 + msPlan.rowCount * MS_ROW_H + (msPlan.rowCount - 1) * 2;

  let msInner = '';
  state.milestones.forEach(ms => {
    const off = dayOffset(ms.date) * ppd;
    if (off < -8 || off > tw + 8) return;
    const row = msPlan.rowFor.get(ms.id) || 0;
    const top = MS_PAD + row * (MS_ROW_H + 2);
    const day = fromISO(ms.date).getDate();
    msInner += `
      <div class="tl-milestone ${ms.soft ? 'soft' : ''}" style="left:${off}px; top:${top}px;" data-ms="${ms.id}">
        <div class="m-dot"></div>
        <div class="m-text"><span class="m-day">${day}</span><span class="m-sep">·</span><span class="m-label">${escapeHtml(ms.label)}</span></div>
      </div>
    `;
  });
  const msHtml = `<div class="tl-milestones" id="ms-lane" style="width:${tw}px; height:${msStripH}px;">${msInner}</div>`;

  // ── TRACKS ──────────────────────────────────────
  // Compute row plans + heights per track
  const trackPlans = state.tracks.map(tr => {
    const plan = assignPhaseRows(tr.phases);
    const laneH = ROW_PAD * 2 + plan.rowCount * ROW_H + (plan.rowCount - 1) * 2;
    return { tr, plan, laneH };
  });

  const lanesHtml = trackPlans.map(({ tr, plan, laneH }) => {
    const bars = tr.phases.map(p => {
      const off = dayOffset(p.start) * ppd;
      const w = p.days * ppd;
      if (off + w < 0 || off > tw) return '';
      const ix = p.ix ? `<span class="ix">${escapeHtml(p.ix)}</span>` : '';
      const row = plan.rowFor.get(p.id) || 0;
      const top = ROW_PAD + row * (ROW_H + 2);
      return `<div class="bar ${p.state}" style="left:${off}px; width:${w}px; top:${top}px;"
                   data-track="${tr.id}" data-phase="${p.id}">${ix}${escapeHtml(p.label)}</div>`;
    }).join('');
    return `<div class="tl-lane" data-track="${tr.id}" style="width:${tw}px; height:${laneH}px;">${bars}</div>`;
  }).join('');

  // Rail cells matching lane heights
  const railHtml = `
    <div class="tl-rail">
      ${trackPlans.map(({ tr, laneH }) => `
        <div class="rail-cell" data-track="${tr.id}" style="height:${laneH}px;">
          <div class="track-label-wrap" data-track="${tr.id}">
            <div class="name-line">
              ${tr.color ? `<span class="track-dot" style="background:${escapeHtml(tr.color)};"></span>` : ''}
              <span class="name">${escapeHtml(tr.name)}</span>
              ${tr.sub ? `<span class="sub">${escapeHtml(tr.sub)}</span>` : ''}
            </div>
          </div>
        </div>
      `).join('')}
      <div class="rail-add-track" id="rail-add-track">+ Track</div>
    </div>
  `;

  // Walls + Today + Scrub
  const todayOff = dayOffset(todayIso) * ppd;
  const todayInRange = todayOff >= -2 && todayOff <= tw + 2;
  const verticalsHtml = `
    <div class="tl-vertical tl-start" style="left:${startWallX}px;"></div>
    <div class="tl-vertical tl-horizon" style="left:${horizonWallX}px;"></div>
    ${todayInRange ? `<div class="tl-vertical tl-today" style="left:${todayOff}px;"></div>` : ''}
    <div class="tl-scrub" id="tl-scrub" style="left:0px;"><div class="tl-scrub-tag" id="tl-scrub-tag"></div></div>
  `;

  root.innerHTML = `
    ${buffersHtml}
    ${axisHtml}
    ${msHtml}
    <div class="tl-tracks" id="tl-tracks" style="width:${tw}px;">
      ${lanesHtml}
      ${railHtml}
    </div>
    ${verticalsHtml}
  `;

  // Stretch full-height things
  const totalH = root.scrollHeight;
  root.querySelectorAll('.tl-buffer').forEach(b => { b.style.height = totalH + 'px'; });
  root.querySelectorAll('.tl-vertical, .tl-scrub').forEach(b => { b.style.height = totalH + 'px'; });
}

function renderLedger() {
  const root = document.getElementById('ledger-root');
  const byWeek = {};
  state.tasks.forEach(t => { if (!byWeek[t.week]) byWeek[t.week] = []; byWeek[t.week].push(t); });

  // Render every week in the startDate→horizonDate range, not just weeks that
  // already have tasks. This closes an IA gap where an empty future week had
  // no "+ Task" affordance. Extra weeks that tasks live in beyond horizon still
  // render so no task is ever hidden.
  const totalDays = Math.max(1, daysBetween(state.startDate, state.horizonDate) + 1);
  const inRangeWeeks = Math.max(1, Math.ceil(totalDays / 7));
  const maxTaskWeek = state.tasks.reduce((m, t) => Math.max(m, t.week || 0), 0);
  const weekCount = Math.max(inRangeWeeks, maxTaskWeek);
  const weekNums = Array.from({ length: weekCount }, (_, i) => i + 1);

  // Track lookup (case-insensitive) so task.tag can surface the owning track's color dot.
  const trackByName = new Map();
  state.tracks.forEach(tr => { if (tr.name) trackByName.set(tr.name.toLowerCase(), tr); });

  const weekRange = (n) => {
    const s = addDays(fromISO(state.startDate), (n - 1) * 7);
    const e = addDays(s, 6);
    return `${fmtShort(toISO(s))} — ${fmtShort(toISO(e))}`;
  };
  const weekActive = (n) => {
    const s = addDays(fromISO(state.startDate), (n - 1) * 7);
    const e = addDays(s, 6);
    const seq = state.tracks.find(t => t.sequential);
    if (!seq) return '';
    const overlap = seq.phases.find(p => {
      const ps = fromISO(p.start);
      const pe = addDays(ps, p.days - 1);
      return !(pe < s || ps > e);
    });
    return overlap ? `Active: ${overlap.label}` : '';
  };

  const renderTag = (tagText) => {
    const t = trackByName.get((tagText || '').toLowerCase());
    const dot = t && t.color
      ? `<span class="tag-dot" style="background:${escapeHtml(t.color)};"></span>`
      : '';
    return `<span class="tag">${dot}${escapeHtml(tagText || '')}</span>`;
  };

  root.innerHTML = weekNums.map(n => {
    const tasks = byWeek[n] || [];
    const empty = tasks.length === 0;
    return `
      <div class="week-group ${empty ? 'week-empty' : ''}">
        <div class="week-head">
          <span class="wnum">Wk ${n}</span>
          <span class="wlabel">${weekRange(n)}</span>
          <button class="link muted" data-add-task="${n}">+ Task</button>
          <span class="wdates">${weekActive(n)}</span>
        </div>
        ${tasks.map(t => `
          <div class="row ${t.type === 'blocked' ? 'blocked' : t.type === 'decision' ? 'decision' : ''}" data-task="${t.id}">
            ${renderTag(t.tag)}
            <span class="task">${escapeHtml(t.text)}</span>
            <span class="route">${escapeHtml(t.route || '')}</span>
          </div>
        `).join('')}
        ${empty ? `<div class="empty-hint">No tasks</div>` : ''}
      </div>
    `;
  }).join('');
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function render() { renderTimeline(); renderLedger(); updateRailTransform(); updateZoomBadge(); }

/* ════════════════════════════════════════════════════
   POPOVER
   ════════════════════════════════════════════════════ */

function openPopover(kind, title, fields, onSave, onDelete) {
  const scrim = document.getElementById('pop-scrim');
  const pop = document.getElementById('popover');
  pop.innerHTML = `
    <div class="pop-head">
      <span class="pop-title">${escapeHtml(title)}</span>
      <span class="pop-kind">${escapeHtml(kind)}</span>
    </div>
    ${fields.map(renderField).join('')}
    <div class="pop-actions">
      <button class="link muted" data-pop-action="cancel">Cancel</button>
      <button class="link active" data-pop-action="save">Save</button>
      ${onDelete ? '<button class="link danger" data-pop-action="delete">Delete</button>' : ''}
    </div>
  `;
  scrim.classList.add('open');

  const getVal = (key) => {
    const el = pop.querySelector(`[data-field="${key}"]`);
    if (!el) return undefined;
    if (el.type === 'checkbox') return el.checked;
    if (el.type === 'number') return Number(el.value);
    return el.value;
  };
  const submit = () => {
    const v = {}; fields.forEach(f => { v[f.key] = getVal(f.key); });
    onSave(v); closePopover(); render(); saveState();
  };

  pop.querySelectorAll('[data-pop-action]').forEach(b => {
    b.onclick = () => {
      const action = b.dataset.popAction;
      if (action === 'cancel') return closePopover();
      if (action === 'save') submit();
      if (action === 'delete') { onDelete(); closePopover(); render(); saveState(); }
    };
  });
  pop.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); submit(); }
  });
  const first = pop.querySelector('input, select, textarea');
  if (first) setTimeout(() => { first.focus(); if (first.select) first.select(); }, 30);
}

function renderField(f) {
  if (f.type === 'select') {
    return `<div class="field"><label>${escapeHtml(f.label)}</label>
      <select data-field="${f.key}">
        ${f.options.map(o => `<option value="${escapeHtml(o.value)}" ${o.value === f.value ? 'selected' : ''}>${escapeHtml(o.label)}</option>`).join('')}
      </select></div>`;
  }
  if (f.type === 'checkbox') {
    return `<div class="field"><label>${escapeHtml(f.label)}</label>
      <div class="check"><input type="checkbox" data-field="${f.key}" ${f.value ? 'checked' : ''}>
      <span style="color:var(--mute); font-size:var(--t-xxs);">${escapeHtml(f.hint || '')}</span></div></div>`;
  }
  if (f.type === 'color') {
    const hint = f.hint ? `<span class="color-swatch-label">${escapeHtml(f.hint)}</span>` : '';
    return `<div class="field"><label>${escapeHtml(f.label)}</label>
      <div class="color-field">
        <input type="color" data-field="${f.key}" value="${escapeHtml(f.value || '#0A0A0A')}">
        ${hint}
      </div></div>`;
  }
  // text/date/number with optional datalist
  let datalistAttr = '';
  let datalistHtml = '';
  if (f.suggest && f.suggest.length) {
    const id = `dl-${f.key}-${Math.random().toString(36).slice(2,7)}`;
    datalistAttr = `list="${id}"`;
    datalistHtml = `<datalist id="${id}">${f.suggest.map(s => `<option value="${escapeHtml(s)}"></option>`).join('')}</datalist>`;
  }
  const hint = f.hint ? `<div class="hint">${escapeHtml(f.hint)}</div>` : '';
  return `<div class="field"><label>${escapeHtml(f.label)}</label>
    <div>
      <input type="${f.type}" data-field="${f.key}" value="${escapeHtml(f.value != null ? f.value : '')}"
        ${f.min != null ? `min="${f.min}"` : ''} ${f.max != null ? `max="${f.max}"` : ''} ${datalistAttr}>
      ${datalistHtml}
      ${hint}
    </div></div>`;
}

function closePopover() { document.getElementById('pop-scrim').classList.remove('open'); }

const STATE_OPTS = [
  { value: 'active',    label: 'Active — now' },
  { value: 'committed', label: 'Committed' },
  { value: 'tentative', label: 'Tentative' },
  { value: 'waiting',   label: 'Waiting / blocked' },
  { value: 'beyond',    label: 'Beyond horizon' }
];
const STATE_CYCLE = ['committed', 'active', 'tentative', 'waiting', 'beyond'];

/* ────────────────────────────────────────────────────────
   Inline TRACK editor — replaces the modal addTrack/editTrack.
   Hijacks .track-label-wrap (edit) or .rail-add-track (add).
   ──────────────────────────────────────────────────────── */
const TRACK_DOT_PALETTE = [
  '#0A0A0A', '#FF4A02', '#0A4A9E', '#2F7A2F', '#A05FB0', '#C07030', '#888888'
];
function nextDotColor(hex) {
  const i = TRACK_DOT_PALETTE.indexOf((hex || '').toLowerCase()) ;
  const ix = Math.max(0, i) ;
  return TRACK_DOT_PALETTE[(ix + 1) % TRACK_DOT_PALETTE.length];
}

function _trackInlineMarkup() {
  return `
    <div class="track-inline">
      <div class="ti-name-row">
        <button class="track-dot-btn" type="button" title="Dot color (click to cycle)"></button>
        <input class="track-name-input" type="text" placeholder="Track name" autocomplete="off" spellcheck="false" />
        <button class="track-delete" type="button" title="Delete track">×</button>
      </div>
      <div class="ti-sub-row">
        <button class="track-seq-chip" type="button" title="Sequential — phases must follow in order">SEQ</button>
        <input class="track-sub-input" type="text" placeholder="subtitle" autocomplete="off" spellcheck="false" />
      </div>
    </div>
  `;
}

// Wire up the inline form inside `host`. `initial` is {name, sub, color, sequential}.
// Callbacks: onCommit(values), onCancel(), onDelete() — all must finalise whatever DOM
// state the caller owns (re-render, restore, etc.).
function _wireTrackInline(host, initial, { onCommit, onCancel, onDelete, showDelete = true }) {
  const inline = host.querySelector('.track-inline');
  const dotBtn = inline.querySelector('.track-dot-btn');
  const nameIn = inline.querySelector('.track-name-input');
  const subIn  = inline.querySelector('.track-sub-input');
  const seqBtn = inline.querySelector('.track-seq-chip');
  const delBtn = inline.querySelector('.track-delete');
  if (!showDelete && delBtn) delBtn.style.visibility = 'hidden';

  const working = { ...initial };
  nameIn.value = working.name || '';
  subIn.value  = working.sub  || '';
  dotBtn.style.background = working.color || '#0A0A0A';
  seqBtn.classList.toggle('on', !!working.sequential);

  let done = false;
  let commitTimer = null;
  const unregister = registerInlineEditor((a) => finish(a));

  function finish(action) {
    if (done) return;
    done = true;
    unregister();
    if (commitTimer) { clearTimeout(commitTimer); commitTimer = null; }
    if (action === 'cancel') { onCancel(); return; }
    if (action === 'delete') { onDelete(); return; }
    // commit
    working.name = nameIn.value.trim();
    working.sub  = subIn.value.trim();
    onCommit(working);
  }

  // Prevent focus-steal from chip/delete clicks (would trigger spurious focusout → commit).
  for (const btn of [dotBtn, seqBtn, delBtn]) {
    if (btn) btn.addEventListener('mousedown', e => e.preventDefault());
  }
  dotBtn.addEventListener('click', () => {
    working.color = nextDotColor(working.color);
    dotBtn.style.background = working.color;
    nameIn.focus();
  });
  seqBtn.addEventListener('click', () => {
    working.sequential = !working.sequential;
    seqBtn.classList.toggle('on', working.sequential);
    nameIn.focus();
  });
  if (delBtn) delBtn.addEventListener('click', () => finish('delete'));

  for (const el of [nameIn, subIn]) {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); finish('commit'); }
      if (e.key === 'Escape') { e.preventDefault(); finish('cancel'); }
      // Cmd/Ctrl + Backspace = delete this track. Noop for the +Track composer
      // (onDelete is bound to a cancel restore there, so no harm).
      if ((e.metaKey || e.ctrlKey) && (e.key === 'Backspace' || e.key === 'Delete')) {
        e.preventDefault(); finish('delete');
      }
    });
    el.addEventListener('focusin', () => {
      if (commitTimer) { clearTimeout(commitTimer); commitTimer = null; }
    });
    el.addEventListener('focusout', () => {
      if (commitTimer) clearTimeout(commitTimer);
      commitTimer = setTimeout(() => {
        if (done) return;
        if (!inline.contains(document.activeElement)) finish('commit');
      }, 40);
    });
  }

  nameIn.focus();
  if (initial.name) nameIn.setSelectionRange(initial.name.length, initial.name.length);
  return { finish };
}

function beginEditTrack(trackId) {
  const track = state.tracks.find(t => t.id === trackId);
  if (!track) return;
  const wrap = document.querySelector(`.track-label-wrap[data-track="${trackId}"]`);
  if (!wrap || wrap.classList.contains('editing')) return;
  closeOtherInlineRows(null);

  const originalHtml = wrap.innerHTML;
  wrap.classList.add('editing');
  wrap.innerHTML = _trackInlineMarkup();

  const initial = {
    name: track.name,
    sub: track.sub || '',
    color: (track.color || '#0A0A0A').toLowerCase(),
    sequential: !!track.sequential,
  };
  _wireTrackInline(wrap, initial, {
    onCancel: () => {
      wrap.classList.remove('editing');
      wrap.innerHTML = originalHtml;
    },
    onDelete: () => {
      state.tracks = state.tracks.filter(t => t.id !== trackId);
      render(); saveState(); flashSave('Deleted');
    },
    onCommit: (v) => {
      if (!v.name) { // empty name = treat as cancel (don't implicit-delete existing tracks)
        wrap.classList.remove('editing');
        wrap.innerHTML = originalHtml;
        return;
      }
      const changed =
        v.name !== track.name ||
        (v.sub || '') !== (track.sub || '') ||
        (v.color || '').toLowerCase() !== (track.color || '#0A0A0A').toLowerCase() ||
        !!v.sequential !== !!track.sequential;
      if (!changed) {
        wrap.classList.remove('editing');
        wrap.innerHTML = originalHtml;
        return;
      }
      track.name = v.name;
      track.sub = v.sub || undefined;
      track.color = (v.color || '').trim() || undefined;
      track.sequential = !!v.sequential;
      render(); saveState();
    }
  });
}

function beginAddTrack() {
  const host = document.getElementById('rail-add-track');
  if (!host || host.classList.contains('editing')) return;
  closeOtherInlineRows(null);

  const originalHtml = host.innerHTML;
  host.classList.add('editing');
  host.innerHTML = _trackInlineMarkup();

  const initial = { name: '', sub: '', color: '#0A0A0A', sequential: false };
  _wireTrackInline(host, initial, {
    showDelete: false,
    onCancel: () => {
      host.classList.remove('editing');
      host.innerHTML = originalHtml;
    },
    onDelete: () => { // unused but required by signature
      host.classList.remove('editing');
      host.innerHTML = originalHtml;
    },
    onCommit: (v) => {
      if (!v.name) {
        // empty name on commit = silent discard. Restore the + Track affordance.
        host.classList.remove('editing');
        host.innerHTML = originalHtml;
        return;
      }
      state.tracks.push({
        id: uid(),
        name: v.name,
        sub: v.sub || undefined,
        color: (v.color || '').trim() || undefined,
        sequential: !!v.sequential,
        phases: [],
      });
      render(); saveState();
    }
  });
}

function findPhase(trackId, phaseId) {
  const tr = state.tracks.find(t => t.id === trackId);
  return { track: tr, phase: tr ? tr.phases.find(p => p.id === phaseId) : null };
}
function cyclePhaseState(trackId, phaseId) {
  const { phase } = findPhase(trackId, phaseId);
  if (!phase) return;
  const idx = STATE_CYCLE.indexOf(phase.state);
  phase.state = STATE_CYCLE[(idx + 1) % STATE_CYCLE.length];
  render(); saveState();
}

/* ────────────────────────────────────────────────────────
   Inline PHASE editor — the bar itself becomes editable in place.
   Start/days remain drag-controlled; label/state/ix are inline.
   Empty label on commit deletes the phase (matches task pattern).
   ──────────────────────────────────────────────────────── */
function beginEditPhase(trackId, phaseId, opts = {}) {
  const { track, phase } = findPhase(trackId, phaseId);
  if (!track || !phase) return;
  const bar = document.querySelector(`.bar[data-track="${trackId}"][data-phase="${phaseId}"]`);
  if (!bar || bar.classList.contains('editing')) return;
  closeOtherInlineRows(null);

  const originalHtml = bar.innerHTML;
  const originalStateClass = phase.state;
  const original = {
    label: phase.label, state: phase.state, ix: phase.ix || '',
    start: phase.start, days: phase.days
  };
  const working  = { ...original };

  bar.classList.add('editing');
  bar.innerHTML = `
    <button class="phase-state-chip" type="button" title="State (click to cycle)">${working.state.charAt(0).toUpperCase()}</button>
    <input class="phase-label-input" type="text" placeholder="Phase label" autocomplete="off" spellcheck="false" />
    <input class="phase-ix-input" type="text" placeholder="ix" autocomplete="off" spellcheck="false" maxlength="4" />
    <button class="phase-delete" type="button" title="Delete phase (Cmd/Ctrl+Del)">×</button>
    <div class="phase-edit-detail">
      <span class="pe-lbl">Start</span>
      <input class="pe-date" type="date" />
      <span class="pe-sep">·</span>
      <span class="pe-lbl">Days</span>
      <input class="pe-days" type="number" min="1" step="1" />
    </div>
  `;
  const chipBtn = bar.querySelector('.phase-state-chip');
  const labelIn = bar.querySelector('.phase-label-input');
  const ixIn    = bar.querySelector('.phase-ix-input');
  const delBtn  = bar.querySelector('.phase-delete');
  const dateIn  = bar.querySelector('.pe-date');
  const daysIn  = bar.querySelector('.pe-days');

  labelIn.value = working.label || '';
  ixIn.value    = working.ix || '';
  dateIn.value  = working.start || '';
  daysIn.value  = working.days || 1;

  let done = false;
  let commitTimer = null;
  const unregister = registerInlineEditor(a => finish(a));

  function setBarStateClass(newState) {
    for (const s of STATE_CYCLE) bar.classList.remove(s);
    bar.classList.add(newState);
    chipBtn.textContent = newState.charAt(0).toUpperCase();
  }

  function restoreOriginalBar() {
    bar.classList.remove('editing');
    for (const s of STATE_CYCLE) bar.classList.remove(s);
    bar.classList.add(originalStateClass);
    bar.innerHTML = originalHtml;
  }

  function finish(action) {
    if (done) return;
    done = true;
    unregister();
    if (commitTimer) { clearTimeout(commitTimer); commitTimer = null; }

    if (action === 'cancel') {
      if (opts.isNew) {
        track.phases = track.phases.filter(p => p.id !== phaseId);
        render(); saveState();
      } else {
        restoreOriginalBar();
      }
      return;
    }
    if (action === 'delete') {
      track.phases = track.phases.filter(p => p.id !== phaseId);
      render(); saveState(); flashSave('Deleted');
      return;
    }
    // commit
    working.label = labelIn.value.trim();
    working.ix    = ixIn.value.trim();
    if (!working.label) {
      // empty label on commit = delete (consistent with task composer)
      track.phases = track.phases.filter(p => p.id !== phaseId);
      render(); saveState();
      return;
    }
    const changed = working.label !== original.label
      || working.state !== original.state
      || working.ix !== original.ix;
    if (!changed && !opts.isNew) {
      restoreOriginalBar();
      return;
    }
    phase.label = working.label;
    phase.state = working.state;
    phase.ix    = working.ix || undefined;
    render(); saveState();
  }

  for (const btn of [chipBtn, delBtn]) {
    btn.addEventListener('mousedown', e => e.preventDefault());
  }
  chipBtn.addEventListener('click', () => {
    const i = STATE_CYCLE.indexOf(working.state);
    working.state = STATE_CYCLE[(i + 1) % STATE_CYCLE.length];
    setBarStateClass(working.state);
    labelIn.focus();
  });
  delBtn.addEventListener('click', () => finish('delete'));

  for (const el of [labelIn, ixIn]) {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); finish('commit'); }
      if (e.key === 'Escape') { e.preventDefault(); finish('cancel'); }
      // Cmd/Ctrl + Backspace = delete this phase regardless of label content.
      if ((e.metaKey || e.ctrlKey) && (e.key === 'Backspace' || e.key === 'Delete')) {
        e.preventDefault(); finish('delete');
      }
    });
    el.addEventListener('focusin', () => {
      if (commitTimer) { clearTimeout(commitTimer); commitTimer = null; }
    });
    el.addEventListener('focusout', () => {
      if (commitTimer) clearTimeout(commitTimer);
      commitTimer = setTimeout(() => {
        if (done) return;
        if (!bar.contains(document.activeElement)) finish('commit');
      }, 40);
    });
    // Don't let clicks inside the inline editor bubble to the pointerdown-based
    // bar-drag machinery (which treats the bar as a draggable target).
    el.addEventListener('pointerdown', e => e.stopPropagation());
  }
  // Also stop pointerdowns on chip/delete from starting a bar-drag.
  for (const btn of [chipBtn, delBtn]) {
    btn.addEventListener('pointerdown', e => e.stopPropagation());
  }

  labelIn.focus();
  if (working.label) labelIn.setSelectionRange(working.label.length, working.label.length);
}

function beginAddPhasePainted(trackId, start, days) {
  const track = state.tracks.find(t => t.id === trackId);
  if (!track) return;
  closeOtherInlineRows(null);
  const newPhase = {
    id: uid(),
    label: '',
    state: 'committed',
    start,
    days: Math.max(1, days),
  };
  track.phases.push(newPhase);
  render();
  // The new bar is now in the DOM — hand off to the inline editor.
  beginEditPhase(track.id, newPhase.id, { isNew: true });
}

// Legacy modal entry points retained as thin shims.
function editPhase(trackId, phaseId) { beginEditPhase(trackId, phaseId); }
function quickLabelPhase(track, suggestedStart, days) {

/* ────────────────────────────────────────────────────────
   Inline MILESTONE editor — the diamond itself becomes editable.
   Soft/hard toggle is the dot glyph itself (◆ hard, ◇ soft).
   Empty label on commit deletes (same as phases / tasks).
   ──────────────────────────────────────────────────────── */
function beginEditMilestone(msId, opts = {}) {
  const ms = state.milestones.find(m => m.id === msId);
  if (!ms) return;
  const msEl = document.querySelector(`.tl-milestone[data-ms="${msId}"]`);
  if (!msEl || msEl.classList.contains('editing')) return;
  closeOtherInlineRows(null);

  const originalHtml = msEl.innerHTML;
  const original = { label: ms.label, soft: !!ms.soft, date: ms.date };
  const working  = { ...original };

  msEl.classList.add('editing');
  // Re-render the internals: keep the dot, replace the text with an input + soft chip + delete.
  msEl.innerHTML = `
    <div class="m-dot"></div>
    <div class="m-text m-edit">
      <input class="ms-date-input" type="date" title="Milestone date" />
      <span class="m-sep">·</span>
      <input class="ms-label-input" type="text" placeholder="Milestone label" autocomplete="off" spellcheck="false" />
      <button class="ms-soft-chip" type="button" title="Soft (◇) vs hard (◆)">${working.soft ? '◇' : '◆'}</button>
      <button class="ms-delete" type="button" title="Delete milestone (Cmd/Ctrl+Del)">×</button>
    </div>
  `;
  const labelIn = msEl.querySelector('.ms-label-input');
  const dateIn  = msEl.querySelector('.ms-date-input');
  const softBtn = msEl.querySelector('.ms-soft-chip');
  const delBtn  = msEl.querySelector('.ms-delete');

  labelIn.value = working.label || '';
  dateIn.value  = working.date || '';

  let done = false;
  let commitTimer = null;
  const unregister = registerInlineEditor(a => finish(a));

  function reflectSoft() {
    msEl.classList.toggle('soft', working.soft);
    softBtn.textContent = working.soft ? '◇' : '◆';
  }

  function restoreOriginal() {
    msEl.classList.remove('editing');
    msEl.classList.toggle('soft', !!ms.soft);
    msEl.innerHTML = originalHtml;
  }

  function finish(action) {
    if (done) return;
    done = true;
    unregister();
    if (commitTimer) { clearTimeout(commitTimer); commitTimer = null; }

    if (action === 'cancel') {
      if (opts.isNew) {
        state.milestones = state.milestones.filter(m => m.id !== msId);
        render(); saveState();
      } else {
        restoreOriginal();
      }
      return;
    }
    if (action === 'delete') {
      state.milestones = state.milestones.filter(m => m.id !== msId);
      render(); saveState(); flashSave('Deleted');
      return;
    }
    // commit
    working.label = labelIn.value.trim();
    working.date  = (dateIn.value || original.date);
    if (!working.label) {
      state.milestones = state.milestones.filter(m => m.id !== msId);
      render(); saveState();
      return;
    }
    const changed = working.label !== original.label
                 || working.soft !== original.soft
                 || working.date !== original.date;
    if (!changed && !opts.isNew) {
      restoreOriginal();
      return;
    }
    ms.label = working.label;
    ms.soft  = !!working.soft;
    ms.date  = working.date;
    render(); saveState();
  }

  for (const btn of [softBtn, delBtn]) {
    btn.addEventListener('mousedown', e => e.preventDefault());
    btn.addEventListener('pointerdown', e => e.stopPropagation());
  }
  softBtn.addEventListener('click', () => {
    working.soft = !working.soft;
    reflectSoft();
    labelIn.focus();
  });
  delBtn.addEventListener('click', () => finish('delete'));

  for (const el of [labelIn, dateIn]) {
    el.addEventListener('pointerdown', e => e.stopPropagation());
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter')  { e.preventDefault(); finish('commit'); }
      if (e.key === 'Escape') { e.preventDefault(); finish('cancel'); }
      // Cmd/Ctrl + Backspace = delete this milestone regardless of label content.
      if ((e.metaKey || e.ctrlKey) && (e.key === 'Backspace' || e.key === 'Delete')) {
        e.preventDefault(); finish('delete');
      }
    });
    el.addEventListener('focusin', () => {
      if (commitTimer) { clearTimeout(commitTimer); commitTimer = null; }
    });
    el.addEventListener('focusout', () => {
      if (commitTimer) clearTimeout(commitTimer);
      commitTimer = setTimeout(() => {
        if (done) return;
        if (!msEl.contains(document.activeElement)) finish('commit');
      }, 40);
    });
  }

  labelIn.focus();
  if (working.label) labelIn.setSelectionRange(working.label.length, working.label.length);
}

// Legacy modal entry points — thin shims.
