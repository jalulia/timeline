<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>time aligns</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  /* ══════════════════════════════════════════════════
     TOKENS
     ══════════════════════════════════════════════════ */
  :root {
    --ink: #0A0A0A;
    --paper: #FFFFFF;
    --hover: #F7F7F7;
    --buffer-bg: #FAFAF8;
    --rule: #D4D4D4;
    --rule-hair: #ECECEC;
    --rule-fine: #F0F0F0;
    --mute: #6B6B6B;
    --mute-soft: #B0B0B0;
    --accent: #FF4A02;
    --accent-soft: #FFE8DD;

    --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
    --s-5: 24px; --s-6: 32px; --s-7: 48px; --s-8: 64px; --s-9: 96px;

    --t-xxs: 9px; --t-xs: 10px; --t-sm: 11px; --t-md: 12px;
    --t-lg: 14px; --t-xl: 18px; --t-2xl: 24px; --t-3xl: 36px;

    --rail-w: 152px;
    --row-h: 30px;       /* single phase row height */
    --row-pad: 4px;      /* lane top/bottom padding */
    --ms-row-h: 22px;    /* milestone single row */
    --ms-pad: 6px;
    --axis-h: 56px;

    --pad-x: var(--s-7);
  }

  @media (max-width: 720px) {
    :root { --pad-x: var(--s-4); --rail-w: 128px; }
  }
  @media (min-width: 1440px) {
    :root { --pad-x: var(--s-8); }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  html { background: var(--paper); }
  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
    font-size: var(--t-md);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .page {
    width: 100%;
    margin: 0 auto;
    padding: var(--s-7) var(--pad-x) var(--s-9);
  }

  /* ══════════════════════════════════════════════════
     HEADER
     ══════════════════════════════════════════════════ */
  .doc-header {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: var(--s-5);
    align-items: baseline;
    padding-bottom: var(--s-7);
  }
  .doc-header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: var(--t-3xl);
    font-weight: 400;
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .doc-clock {
    font-family: 'DM Mono', monospace;
    font-size: var(--t-lg);
    color: var(--ink);
    letter-spacing: 0.04em;
  }
  .doc-clock .time { color: var(--mute-soft); margin-left: 6px; }

  /* ══════════════════════════════════════════════════
     STICKY TOOLBAR
     ══════════════════════════════════════════════════ */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    padding: var(--s-4) 0;
    margin-bottom: var(--s-7);
  }
  .t-row {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: var(--s-5);
    row-gap: var(--s-3);
  }
  .t-spacer { flex: 1; min-width: var(--s-4); }
  .t-input { display: inline-flex; align-items: baseline; gap: var(--s-2); }
  .t-label {
    font-size: var(--t-xxs);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mute);
    font-weight: 500;
  }

  .tool-input {
    font-family: 'DM Mono', monospace;
    font-size: var(--t-sm);
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--ink);
    padding: 4px 2px 3px;
    color: var(--ink);
    border-radius: 0;
    letter-spacing: 0.02em;
    min-width: 120px;
  }
  .tool-input:focus { outline: none; border-bottom-color: var(--accent); }
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: opacity(0.45) grayscale(1);
    cursor: pointer;
  }
  input[type="date"]::-webkit-calendar-picker-indicator:hover {
    filter: opacity(0.9) grayscale(1);
  }

  .link {
    font-family: 'DM Mono', monospace;
    font-size: var(--t-sm);
    background: none;
    border: none;
    color: var(--ink);
    cursor: pointer;
    padding: 2px 0 3px;
    border-bottom: 1px solid currentColor;
    letter-spacing: 0.04em;
    font-weight: 500;
    transition: color 0.1s, border-bottom-color 0.1s;
  }
  .link:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .link.muted {
    color: var(--mute);
    font-weight: 400;
    border-bottom-color: var(--rule);
  }
  .link.muted:hover { color: var(--ink); border-bottom-color: var(--ink); }
  .link.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .link.active:hover { color: var(--ink); border-bottom-color: var(--ink); }

  .save-indicator {
    font-size: var(--t-xs);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mute-soft);
    transition: color 0.2s;
    font-weight: 500;
  }
  .save-indicator.flash { color: var(--accent); }

  /* ══════════════════════════════════════════════════
     TIMELINE
     ══════════════════════════════════════════════════ */
  .tl {
    position: relative;
    width: 100%;
    user-select: none;
  }

  .tl-buffer {
    position: absolute;
    top: 0;
    bottom: 0;
    background: var(--buffer-bg);
    z-index: 0;
    pointer-events: none;
  }

  /* AXIS — ruler style */
  .tl-axis {
    position: relative;
    height: var(--axis-h);
    border-bottom: 1px solid var(--ink);
    z-index: 2;
  }
  .day-tick {
    position: absolute;
    width: 1px;
    background: var(--rule-fine);
  }
  .day-tick.minor { top: 44px; bottom: 0; }
  .day-tick.quarter { top: 38px; bottom: 0; background: var(--rule); }
  .day-tick.week { top: 30px; bottom: 0; background: var(--mute); }
  .day-tick.month { top: 24px; bottom: 0; background: var(--ink); width: 1.5px; }
  .day-tick.in-buffer { opacity: 0.4; }

  .day-num {
    position: absolute;
    top: 9px;
    font-size: var(--t-xxs);
    color: var(--mute);
    letter-spacing: 0.05em;
    transform: translateX(-50%);
    white-space: nowrap;
    font-weight: 500;
  }
  .day-num.week { color: var(--ink); font-weight: 600; }
  .day-num.month { color: var(--ink); font-weight: 700; font-size: var(--t-xs); }
  .day-num.in-buffer { color: var(--mute-soft); font-weight: 400; opacity: 0.75; }

  .month-label {
    position: absolute;
    top: 6px;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: var(--t-xl);
    color: var(--ink);
    transform: translateX(14px);
    white-space: nowrap;
    line-height: 1;
    pointer-events: none;
  }
  .month-label.in-buffer { color: var(--mute-soft); }

  /* MILESTONES — distinct strip with stacking */
  .tl-milestones {
    position: relative;
    border-bottom: 1px solid var(--ink);
    background: var(--paper);
    z-index: 2;
  }
  .tl-milestone {
    position: absolute;
    height: var(--ms-row-h);
    display: flex;
    align-items: center;
    cursor: pointer;
    z-index: 3;
    touch-action: none;
  }
  body.edit-mode .tl-milestone { cursor: grab; }
  body.edit-mode .tl-milestone:active { cursor: grabbing; }
  .m-dot {
    width: 9px;
    height: 9px;
    background: var(--accent);
    transform: rotate(45deg);
    margin-left: -4.5px;
    flex-shrink: 0;
    transition: transform 0.08s;
    pointer-events: none;
  }
  .tl-milestone:hover .m-dot { transform: rotate(45deg) scale(1.3); }
  .tl-milestone.soft .m-dot {
    background: var(--paper);
    border: 1.5px solid var(--accent);
  }
  .m-text {
    margin-left: 10px;
    font-size: var(--t-sm);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.04em;
    pointer-events: none;
  }
  .m-day { color: var(--mute); font-weight: 500; }
  .m-sep { color: var(--mute-soft); margin: 0 5px; }
  .m-label { color: var(--ink); font-weight: 500; }
  .tl-milestone:not(.soft) .m-label { font-weight: 600; }
  .tl-milestone.dragging { z-index: 10; }
  .tl-milestone.dragging .m-dot { transform: rotate(45deg) scale(1.5); }

  /* VERTICALS */
  .tl-vertical {
    position: absolute;
    top: 0;
    bottom: 0;
    z-index: 4;
    pointer-events: none;
  }
  .tl-start { width: 1.5px; background: var(--ink); }
  .tl-horizon {
    width: 2px;
    background: var(--ink);
  }
  .tl-horizon::after {
    content: 'HORIZON';
    position: absolute;
    bottom: 12px;
    left: 8px;
    font-size: var(--t-xxs);
    letter-spacing: 0.18em;
    color: var(--ink);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-weight: 600;
  }
  .tl-today {
    width: 1px;
    background: var(--accent);
    opacity: 0.85;
  }
  .tl-today::before {
    content: '';
    position: absolute;
    top: -3px;
    left: -2.5px;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  .tl-scrub {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--ink);
    z-index: 6;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.08s, background 0.08s, width 0.08s;
  }
  body.edit-mode .tl-scrub.show { opacity: 0.65; }
  .tl-scrub.active {
    opacity: 1 !important;
    background: var(--accent);
    width: 2px;
  }
  .tl-scrub.active::before {
    content: '';
    position: absolute;
    top: -4px;
    left: -3.25px;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
  }
  .tl-scrub-tag {
    position: absolute;
    top: 4px;
    left: 6px;
    font-size: var(--t-xxs);
    letter-spacing: 0.12em;
    background: var(--paper);
    color: var(--ink);
    padding: 2px 5px;
    font-weight: 600;
    border: 1px solid var(--ink);
    white-space: nowrap;
    transition: color 0.08s, border-color 0.08s;
  }
  .tl-scrub.active .tl-scrub-tag {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Phases/milestones highlight as scrub passes through them */
  .bar.scrub-hit {
    box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--accent);
    z-index: 4;
  }
  .tl-milestone.scrub-hit .m-dot {
    transform: rotate(45deg) scale(1.4);
  }

  /* Crosshair cursor on every scrubbable zone */
  body.edit-mode .tl-tracks,
  body.edit-mode .tl-axis,
  body.edit-mode .tl-milestones { cursor: ew-resize; }
  body.edit-mode .tl-axis:hover,
  body.edit-mode .tl-milestones:hover { background: rgba(255, 74, 2, 0.015); }

  /* TRACKS WRAPPER */
  .tl-tracks {
    position: relative;
  }

  /* RAIL — sticky overlay */
  .tl-rail {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--rail-w);
    z-index: 5;
    background: var(--paper);
    border-right: 1px solid var(--rule-hair);
  }
  .tl-rail .rail-cell {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: var(--row-pad) var(--s-4) var(--row-pad) var(--s-2);
    border-bottom: 1px solid var(--rule-hair);
    background: var(--paper);
  }
  .tl-rail .rail-cell .track-label-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  body.edit-mode .tl-rail .rail-cell .track-label-wrap { cursor: pointer; }
  body.edit-mode .tl-rail .rail-cell .track-label-wrap:hover .name { color: var(--accent); }
  .track-cat { display: none; } /* deprecated — replaced by .track-dot */
  .track-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--ink);
    flex-shrink: 0;
    align-self: center;
    margin-right: 2px;
  }
  .name-line {
    display: flex;
    align-items: center;
    gap: var(--s-1);
    line-height: 1.2;
  }
  .name-line .sub { margin-left: var(--s-1); align-self: baseline; }
  .name {
    font-size: var(--t-sm);
    font-weight: 600;
    color: var(--ink);
    transition: color 0.1s;
  }
  .sub {
    font-size: var(--t-xxs);
    color: var(--mute);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .tl-rail .rail-add-track {
    height: 32px;
    display: none;
    align-items: center;
    justify-content: flex-end;
    padding-right: var(--s-4);
    font-size: var(--t-xxs);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mute);
    cursor: pointer;
    border-bottom: 1px solid var(--rule-hair);
    font-weight: 500;
    background: var(--paper);
  }
  body.edit-mode .tl-rail .rail-add-track { display: flex; }
  .tl-rail .rail-add-track:hover { color: var(--accent); }

  /* LANES — height set inline based on row count */
  .tl-lane {
    position: relative;
    border-bottom: 1px solid var(--rule-hair);
    background: transparent;
  }
  .tl-lane:last-of-type { border-bottom: 1px solid var(--ink); }

  /* BARS */
  .bar {
    position: absolute;
    height: 22px;
    padding: 0 var(--s-2);
    display: flex;
    align-items: center;
    font-size: var(--t-xxs);
    letter-spacing: 0.04em;
    overflow: hidden;
    white-space: nowrap;
    cursor: pointer;
    z-index: 1;
    font-weight: 500;
    touch-action: none;
    transition: box-shadow 0.08s;
  }
  body.edit-mode .bar { cursor: grab; }
  body.edit-mode .bar:active { cursor: grabbing; }
  .bar:hover {
    z-index: 4;
    box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--accent);
  }
  .bar.dragging {
    opacity: 0.85;
    z-index: 10;
    box-shadow: 0 0 0 2px var(--paper), 0 0 0 3px var(--accent), 0 4px 12px rgba(0,0,0,0.15);
  }
  .bar.committed {
    border: 1px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
  }
  .bar.active {
    border: 1px solid var(--accent);
    background: var(--accent);
    color: var(--paper);
    font-weight: 600;
  }
  .bar.tentative {
    border: 1px dashed var(--mute);
    background: var(--paper);
    color: var(--mute);
  }
  .bar.waiting {
    border: 1px dashed var(--accent);
    color: var(--accent);
    background-color: var(--paper);
    background-image: repeating-linear-gradient(-45deg, transparent, transparent 4px, var(--accent-soft) 4px, var(--accent-soft) 5px);
  }
  .bar.beyond {
    border: 1px dotted var(--mute);
    background: var(--paper);
    color: var(--mute);
    font-style: italic;
  }
  .bar .ix {
    font-weight: 600;
    margin-right: var(--s-1);
    opacity: 0.6;
  }

  .paint-bar {
    position: absolute;
    height: 22px;
    background: var(--accent);
    opacity: 0.25;
    border: 1px dashed var(--accent);
    pointer-events: none;
    z-index: 8;
  }

  body.edit-mode .bar::before,
  body.edit-mode .bar::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 6px;
    cursor: ew-resize;
    z-index: 2;
  }
  body.edit-mode .bar::before { left: 0; }
  body.edit-mode .bar::after { right: 0; }
  body.edit-mode .bar:hover::before {
    border-left: 2px solid var(--ink);
    background: linear-gradient(to right, rgba(255, 74, 2, 0.15), transparent);
  }
  body.edit-mode .bar:hover::after {
    border-right: 2px solid var(--ink);
    background: linear-gradient(to left, rgba(255, 74, 2, 0.15), transparent);
  }
  body.edit-mode .bar.active:hover::before { border-left-color: var(--paper); }
  body.edit-mode .bar.active:hover::after { border-right-color: var(--paper); }

  .drag-tip {
    position: fixed;
    z-index: 200;
    background: var(--ink);
    color: var(--paper);
    padding: 6px 10px;
    font-size: var(--t-xxs);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    pointer-events: none;
    font-weight: 600;
    display: none;
    white-space: nowrap;
  }
  .drag-tip.show { display: block; }
  .drag-tip .sep { color: var(--mute-soft); margin: 0 6px; }
  .drag-tip .accent { color: var(--accent); }

  /* ══════════════════════════════════════════════════
     POPOVER
     ══════════════════════════════════════════════════ */
  .pop-scrim {
    position: fixed;
    inset: 0;
    background: rgba(10, 10, 10, 0.45);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: var(--s-4);
  }
  .pop-scrim.open { display: flex; }
  .popover {
    background: var(--paper);
    border: 1px solid var(--ink);
    padding: var(--s-5) var(--s-5) var(--s-4);
    width: 380px;
    max-width: 100%;
    box-shadow: 6px 6px 0 rgba(10, 10, 10, 0.1);
  }
  .popover .pop-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: var(--s-4);
    padding-bottom: var(--s-2);
    border-bottom: 1px solid var(--rule);
  }
  .popover .pop-title {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: var(--t-xl);
  }
  .popover .pop-kind {
    font-size: var(--t-xxs);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mute);
    font-weight: 500;
  }
  .popover .field {
    display: grid;
    grid-template-columns: 88px 1fr;
    gap: var(--s-3);
    align-items: baseline;
    margin-bottom: var(--s-3);
  }
  .popover .field label {
    font-size: var(--t-xxs);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mute);
    font-weight: 500;
  }
  .popover .field input,
  .popover .field select,
  .popover .field textarea {
    font-family: 'DM Mono', monospace;
    font-size: var(--t-sm);
    padding: 6px 8px;
    background: var(--paper);
    border: 1px solid var(--rule);
    color: var(--ink);
    border-radius: 0;
    width: 100%;
  }
  .popover .field input:focus,
  .popover .field select:focus,
  .popover .field textarea:focus { outline: none; border-color: var(--ink); }
  .popover .field .check {
    display: flex;
    align-items: center;
    gap: var(--s-2);
    font-size: var(--t-sm);
  }
  .popover .field .color-field {
    display: flex;
    align-items: center;
    gap: var(--s-2);
  }
  .popover .field .color-field input[type="color"] {
    width: 38px;
    height: 28px;
    padding: 2px;
    border: 1px solid var(--rule);
    background: var(--paper);
    cursor: pointer;
    flex-shrink: 0;
  }
  .popover .field .color-field .color-swatch-label {
    font-family: 'DM Mono', monospace;
    font-size: var(--t-xs);
    color: var(--mute);
    letter-spacing: 0.04em;
  }
  .popover .field .hint {
    font-size: var(--t-xxs);
    color: var(--mute-soft);
    letter-spacing: 0.05em;
    margin-top: 4px;
  }
  .popover .pop-actions {
    display: flex;
    gap: var(--s-3);
    margin-top: var(--s-4);
    padding-top: var(--s-3);
    border-top: 1px solid var(--rule);
    align-items: baseline;
  }
  .popover .pop-actions .link.danger {
    color: var(--accent);
    margin-left: auto;
  }
  .popover .pop-actions .link.danger:hover { color: var(--ink); border-bottom-color: var(--ink); }

  /* PUNCH SHEET */
  .ledger { margin-top: var(--s-9); }
  .week-group { margin-bottom: var(--s-7); }
  .week-head {
    display: flex;
    align-items: baseline;
    gap: var(--s-3);
    padding-bottom: var(--s-2);
    margin-bottom: var(--s-3);
    border-bottom: 1px solid var(--ink);
  }
  .week-head .wnum {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 28px;
    color: var(--ink);
    line-height: 1;
  }
  .week-head .wlabel {
    font-size: var(--t-xs);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mute);
    font-weight: 500;
  }
  .week-head .wdates {
    margin-left: auto;
    font-size: var(--t-xs);
    color: var(--mute);
    letter-spacing: 0.1em;
  }
  .week-head .link {
    margin-left: var(--s-3);

const addDays = (d, n) => { const c = new Date(d); c.setDate(c.getDate() + n); return c; };
const daysBetween = (a, b) => Math.round((fromISO(b) - fromISO(a)) / 86400000);

let state = JSON.parse(JSON.stringify(SEED));
let editMode = true;
let saveTimer = null;

function realToday() { return toISO(new Date()); }

const history = [];
const HISTORY_LIMIT = 60;
function snapshot() { history.push(JSON.stringify(state)); if (history.length > HISTORY_LIMIT) history.shift(); }
function undo() {
  if (history.length < 2) { flashSave('Nothing to undo'); return; }
  history.pop();
  state = JSON.parse(history[history.length - 1]);
  syncInputs(); render(); persistOnly();
  flashSave('Undone');
}

const saveEl = document.getElementById('save-indicator');
let flashTimer = null;
function flashSave(text) {
  saveEl.textContent = text;
  saveEl.classList.add('flash');
  if (flashTimer) clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { saveEl.classList.remove('flash'); saveEl.textContent = 'Saved'; }, 800);
}

async function loadState() {
  // Try GitHub first; fall back to local cache so the page still renders offline.
  try {
    const url = `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}&t=${Date.now()}`;
    const r = await fetch(url, { headers: authHeaders(), cache: 'no-store' });
    if (r.status === 404) {
      // state.json doesn't exist yet — first ever run against a fresh repo.
      currentSha = null;
      flashSave('New repo');
      return;
    }
    if (!r.ok) throw new Error('load ' + r.status);
    const data = await r.json();
    currentSha = data.sha;
    const json = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
    const parsed = JSON.parse(json);
    if (parsed && parsed.tracks && parsed.milestones && parsed.tasks) {
      state = parsed;
      localStorage.setItem(CACHE_KEY, json);
      flashSave('Synced');
    }
  } catch (e) {
    console.warn('GitHub load failed, trying cache', e);
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) { try { state = JSON.parse(cached); flashSave('Offline'); } catch (err) {} }
    else { flashSave('Offline · seed'); }
  }
}

async function persistNow() {
  const token = getToken();
  if (!token) { flashSave('Need token'); return false; }
  const json = JSON.stringify(state, null, 2);
  localStorage.setItem(CACHE_KEY, json);
  const body = {
    message: 'update timeline ' + new Date().toISOString(),
    content: btoa(unescape(encodeURIComponent(json))),
    branch: GH_BRANCH,
  };
  if (currentSha) body.sha = currentSha;
  try {
    flashSave('Saving…');
    const r = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`, {
      method: 'PUT',
      headers: { ...authHeaders(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (r.status === 409 || r.status === 422) {
      flashSave('Out of date — pulling');
      await loadState(); syncInputs(); render();
      return false;
    }
    if (r.status === 401 || r.status === 403) { flashSave('Auth failed'); return false; }
    if (!r.ok) throw new Error('save ' + r.status);
    const data = await r.json();
    currentSha = data.content.sha;
    flashSave('Saved');
    return true;
  } catch (e) {
    console.warn('save failed', e);
    flashSave('Save failed');
    return false;
  }
}

function persistOnly() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(persistNow, 800); // debounce so a drag doesn't spam commits
}

function saveState() { snapshot(); persistOnly(); flashSave('Queued'); }

/* ════════════════════════════════════════════════════
   LABEL POOL — 3rd taxonomy layer
   ════════════════════════════════════════════════════ */

function labelPool() {
  const set = new Set();
  state.tracks.forEach(t => { if (t.label && t.label.trim()) set.add(t.label.trim()); });
  return [...set].sort((a, b) => a.localeCompare(b));
}

/* ════════════════════════════════════════════════════
   GEOMETRY
   ════════════════════════════════════════════════════ */

const RAIL_W_NORMAL = 152, RAIL_W_NARROW = 128;
function getRailW() { return window.innerWidth <= 720 ? RAIL_W_NARROW : RAIL_W_NORMAL; }

let _geom = null;
function recomputeGeometry() {
  const tlEl = document.getElementById('tl-root');
  const padX = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--pad-x')) || 48;
  const pageInnerW = (tlEl ? tlEl.clientWidth : (window.innerWidth - padX * 2));
  const railW = getRailW();
  const workingDays = Math.max(1, daysBetween(state.startDate, state.horizonDate) + 1);

  let ppd = (pageInnerW - railW) / (workingDays + 2 * VISIBLE_BUFFER_DAYS);
  if (ppd < MIN_PX_PER_DAY) ppd = MIN_PX_PER_DAY;
  ppd = Math.floor(ppd * 100) / 100;

  const railBufferDays = railW / ppd;
  const totalLeftBufferDays = railBufferDays + VISIBLE_BUFFER_DAYS;
  const viewStart = toISO(addDays(fromISO(state.startDate), -Math.ceil(totalLeftBufferDays)));
  const viewEnd   = toISO(addDays(fromISO(state.horizonDate),  VISIBLE_BUFFER_DAYS));
  const totalViewDays = Math.max(1, daysBetween(viewStart, viewEnd) + 1);
  const totalWidth = totalViewDays * ppd;

  _geom = { ppd, viewStart, viewEnd, totalViewDays, totalWidth, railW, pageInnerW };
  return _geom;
}
function geom() { return _geom || recomputeGeometry(); }

function dayOffset(iso) { return daysBetween(geom().viewStart, iso); }
function xForDate(iso) { return dayOffset(iso) * geom().ppd; }
function dateFromX(x) {
  const days = Math.round(x / geom().ppd);
  return toISO(addDays(fromISO(geom().viewStart), days));
}
function isInBuffer(iso) {
  const d = fromISO(iso);
  return d < fromISO(state.startDate) || d > fromISO(state.horizonDate);
}

/* ════════════════════════════════════════════════════
   STACKING — assign rows to overlapping items
   ════════════════════════════════════════════════════ */

// Phases within a track: row = lowest index where this phase doesn't overlap
function assignPhaseRows(phases) {
  const sorted = [...phases].sort((a, b) =>
    fromISO(a.start) - fromISO(b.start) || a.days - b.days
  );
  const rowEnds = []; // per-row last end-date as Date
  const result = new Map();
  sorted.forEach(p => {
    const pStart = fromISO(p.start);
    const pEnd = addDays(pStart, p.days - 1);
    let row = 0;
    while (row < rowEnds.length && rowEnds[row] >= pStart) row++;
    rowEnds[row] = pEnd;
    result.set(p.id, row);
  });
  return { rowFor: result, rowCount: Math.max(1, rowEnds.length) };
}

// Milestones: stacking based on visual width
function assignMilestoneRows(milestones, ppd) {
  const sorted = [...milestones].sort((a, b) => fromISO(a.date) - fromISO(b.date));
  const rowEnds = []; // per-row right-pixel-edge
  const result = new Map();
  sorted.forEach(ms => {
    const x = dayOffset(ms.date) * ppd;
    const right = x + MS_MIN_LABEL_PX;
    let row = 0;
    while (row < rowEnds.length && rowEnds[row] >= x) row++;
    rowEnds[row] = right;
    result.set(ms.id, row);
  });
  return { rowFor: result, rowCount: Math.max(1, rowEnds.length) };
}

/* ════════════════════════════════════════════════════
   RULER AXIS — ticks every day, adaptive number density
   ════════════════════════════════════════════════════ */

function tickSpacing(ppd, pageInnerW) {
  const monthFrac = (30 * ppd) / pageInnerW;
  if (monthFrac >= 0.5)   return 1; // every day
  if (monthFrac >= 0.25)  return 2; // every other day
  if (monthFrac >= 0.125) return 4; // ~weekly-ish
  return 7;                          // every 7 days
}

/* ════════════════════════════════════════════════════
   CLOCK
   ════════════════════════════════════════════════════ */

function updateClock() {
  const now = new Date();
  document.getElementById('clock-date').textContent =
    `${MONTHS[now.getMonth()]} ${now.getDate()} ${now.getFullYear()}`;
  document.getElementById('clock-time').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

/* ════════════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════════════ */

function renderTimeline() {
  const root = document.getElementById('tl-root');
  recomputeGeometry();
  const g = geom();
  const tw = g.totalWidth;
  const ppd = g.ppd;
  const vStart = fromISO(g.viewStart);
  const vEnd   = fromISO(g.viewEnd);
  const todayIso = realToday();
  const td = g.totalViewDays;

  // Buffers
  const startWallX = xForDate(state.startDate);
  const horizonWallX = xForDate(state.horizonDate);
  const buffersHtml = `
    <div class="tl-buffer" style="left:0; width:${startWallX}px;"></div>
    <div class="tl-buffer" style="left:${horizonWallX + 2}px; width:${tw - horizonWallX - 2}px;"></div>
  `;

  // ── AXIS ─────────────────────────────────────────
  const spacing = tickSpacing(ppd, g.pageInnerW);

  let axisInner = '';
  for (let i = 0; i < td; i++) {
    const d = addDays(vStart, i);
    const iso = toISO(d);
    const off = i * ppd;
    const day = d.getDate();
    const inBuf = isInBuffer(iso);

    // Tick weight
    let tickClass = 'minor';
    if (day === 1) tickClass = 'month';
    else if (day === 8 || day === 15 || day === 22 || day === 29) tickClass = 'week';
    else if (day % 2 === 1 && spacing <= 4) tickClass = 'quarter';

    if (inBuf) tickClass += ' in-buffer';

    axisInner += `<div class="day-tick ${tickClass}" style="left:${off}px;"></div>`;

    // Number visibility
    let showNum = false;
    let numClass = '';
    if (day === 1) { showNum = true; numClass = 'month'; }
    else if (day === 8 || day === 15 || day === 22 || day === 29) {
      // always show quarter-anchors when spacing <= 7
      if (spacing <= 7) { showNum = true; numClass = 'week'; }
    }
    else if ((day - 1) % spacing === 0) { showNum = true; }

    if (showNum) {
      const numCls = `${numClass}${inBuf ? ' in-buffer' : ''}`;
      axisInner += `<div class="day-num ${numCls}" style="left:${off}px;">${day}</div>`;
    }
  }

  // Month labels
  let m = new Date(vStart.getFullYear(), vStart.getMonth(), 1);
  while (m <= vEnd) {
    const mIso = toISO(m < vStart ? vStart : m);
    const inBuf = isInBuffer(mIso);
    const monthName = m.toLocaleString('en', { month: 'long' });
    axisInner += `<div class="month-label ${inBuf ? 'in-buffer' : ''}" style="left:${dayOffset(mIso) * ppd}px;">${monthName}</div>`;
    m = new Date(m.getFullYear(), m.getMonth() + 1, 1);
  }

  const axisHtml = `<div class="tl-axis" style="width:${tw}px;">${axisInner}</div>`;

  // ── MILESTONES ──────────────────────────────────
  const msPlan = assignMilestoneRows(state.milestones, ppd);
  const msStripH = MS_PAD * 2 + msPlan.rowCount * MS_ROW_H + (msPlan.rowCount - 1) * 2;

  let msInner = '';
  state.milestones.forEach(ms => {
    const off = dayOffset(ms.date) * ppd;
    if (off < -8 || off > tw + 8) return;
    const row = msPlan.rowFor.get(ms.id) || 0;
    const top = MS_PAD + row * (MS_ROW_H + 2);
    // Compute right limit based on next milestone in same row
    let maxW = 240;
    const sortedInRow = [...state.milestones]
      .filter(o => msPlan.rowFor.get(o.id) === row && o.id !== ms.id)
      .sort((a, b) => fromISO(a.date) - fromISO(b.date));
    const after = sortedInRow.find(o => fromISO(o.date) > fromISO(ms.date));
    if (after) {
      maxW = Math.max(28, dayOffset(after.date) * ppd - off - 16);
    }
    const day = fromISO(ms.date).getDate();
    msInner += `
      <div class="tl-milestone ${ms.soft ? 'soft' : ''}" style="left:${off}px; top:${top}px;" data-ms="${ms.id}">
        <div class="m-dot"></div>
        <div class="m-text" style="max-width:${maxW}px;"><span class="m-day">${day}</span><span class="m-sep">·</span><span class="m-label">${escapeHtml(ms.label)}</span></div>
      </div>
    `;
  });
  const msHtml = `<div class="tl-milestones" id="ms-lane" style="width:${tw}px; height:${msStripH}px;">${msInner}</div>`;

  // ── TRACKS ──────────────────────────────────────
  // Compute row plans + heights per track
  const trackPlans = state.tracks.map(tr => {
    const plan = assignPhaseRows(tr.phases);
    const laneH = ROW_PAD * 2 + plan.rowCount * ROW_H + (plan.rowCount - 1) * 2;
    return { tr, plan, laneH };
  });

  const lanesHtml = trackPlans.map(({ tr, plan, laneH }) => {
    const bars = tr.phases.map(p => {
      const off = dayOffset(p.start) * ppd;
      const w = p.days * ppd;
      if (off + w < 0 || off > tw) return '';
      const ix = p.ix ? `<span class="ix">${escapeHtml(p.ix)}</span>` : '';
      const row = plan.rowFor.get(p.id) || 0;
      const top = ROW_PAD + row * (ROW_H + 2);
      return `<div class="bar ${p.state}" style="left:${off}px; width:${w}px; top:${top}px;"
                   data-track="${tr.id}" data-phase="${p.id}">${ix}${escapeHtml(p.label)}</div>`;
    }).join('');
    return `<div class="tl-lane" data-track="${tr.id}" style="width:${tw}px; height:${laneH}px;">${bars}</div>`;
  }).join('');

  // Rail cells matching lane heights
  const railHtml = `
    <div class="tl-rail">
      ${trackPlans.map(({ tr, laneH }) => `
        <div class="rail-cell" data-track="${tr.id}" style="height:${laneH}px;">
          <div class="track-label-wrap" data-track="${tr.id}">
            <div class="name-line">
              ${tr.color ? `<span class="track-dot" style="background:${escapeHtml(tr.color)};"></span>` : ''}
              <span class="name">${escapeHtml(tr.name)}</span>
              ${tr.sub ? `<span class="sub">${escapeHtml(tr.sub)}</span>` : ''}
            </div>
          </div>
        </div>
      `).join('')}
      <div class="rail-add-track" id="rail-add-track">+ Track</div>
    </div>
  `;

  // Walls + Today + Scrub
  const todayOff = dayOffset(todayIso) * ppd;
  const todayInRange = todayOff >= -2 && todayOff <= tw + 2;
  const verticalsHtml = `
    <div class="tl-vertical tl-start" style="left:${startWallX}px;"></div>
    <div class="tl-vertical tl-horizon" style="left:${horizonWallX}px;"></div>
    ${todayInRange ? `<div class="tl-vertical tl-today" style="left:${todayOff}px;"></div>` : ''}
    <div class="tl-scrub" id="tl-scrub" style="left:0px;"><div class="tl-scrub-tag" id="tl-scrub-tag"></div></div>
  `;

  root.innerHTML = `
    ${buffersHtml}
    ${axisHtml}
    ${msHtml}
    <div class="tl-tracks" id="tl-tracks" style="width:${tw}px;">
      ${lanesHtml}
      ${railHtml}
    </div>
    ${verticalsHtml}
  `;

  // Stretch full-height things
  const totalH = root.scrollHeight;
  root.querySelectorAll('.tl-buffer').forEach(b => { b.style.height = totalH + 'px'; });
  root.querySelectorAll('.tl-vertical, .tl-scrub').forEach(b => { b.style.height = totalH + 'px'; });
}

function renderLedger() {
  const root = document.getElementById('ledger-root');
  const byWeek = {};
  state.tasks.forEach(t => { if (!byWeek[t.week]) byWeek[t.week] = []; byWeek[t.week].push(t); });
  const weekNums = Object.keys(byWeek).map(Number).sort((a, b) => a - b);

  const weekRange = (n) => {
    const s = addDays(fromISO(state.startDate), (n - 1) * 7);
    const e = addDays(s, 6);
    return `${fmtShort(toISO(s))} — ${fmtShort(toISO(e))}`;
  };
  const weekActive = (n) => {
    const s = addDays(fromISO(state.startDate), (n - 1) * 7);
    const e = addDays(s, 6);
    const seq = state.tracks.find(t => t.sequential);
    if (!seq) return '';
    const overlap = seq.phases.find(p => {
      const ps = fromISO(p.start);
      const pe = addDays(ps, p.days - 1);
      return !(pe < s || ps > e);
    });
    return overlap ? `Active: ${overlap.label}` : '';
  };

  if (!weekNums.length) {
    root.innerHTML = `<div style="color:var(--mute); font-size:var(--t-sm); padding:var(--s-4) 0;">No tasks yet.</div>`;
    return;
  }

  root.innerHTML = weekNums.map(n => `
    <div class="week-group">
      <div class="week-head">
        <span class="wnum">Wk ${n}</span>
        <span class="wlabel">${weekRange(n)}</span>
        <button class="link muted" data-add-task="${n}">+ Task</button>
        <span class="wdates">${weekActive(n)}</span>
      </div>
      ${byWeek[n].map(t => `
        <div class="row ${t.type === 'blocked' ? 'blocked' : t.type === 'decision' ? 'decision' : ''}" data-task="${t.id}">
          <span class="tag">${escapeHtml(t.tag)}</span>
          <span class="task">${escapeHtml(t.text)}</span>
          <span class="route">${escapeHtml(t.route || '')}</span>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function render() { renderTimeline(); renderLedger(); }

function openPopover(kind, title, fields, onSave, onDelete) {
  const scrim = document.getElementById('pop-scrim');
  const pop = document.getElementById('popover');
  pop.innerHTML = `
    <div class="pop-head">
      <span class="pop-title">${escapeHtml(title)}</span>
      <span class="pop-kind">${escapeHtml(kind)}</span>
    </div>
    ${fields.map(renderField).join('')}
    <div class="pop-actions">
      <button class="link muted" data-pop-action="cancel">Cancel</button>
      <button class="link active" data-pop-action="save">Save</button>
      ${onDelete ? '<button class="link danger" data-pop-action="delete">Delete</button>' : ''}
    </div>
  `;
  scrim.classList.add('open');

  const getVal = (key) => {
    const el = pop.querySelector(`[data-field="${key}"]`);
    if (!el) return undefined;
    if (el.type === 'checkbox') return el.checked;
    if (el.type === 'number') return Number(el.value);
    return el.value;
  };
  const submit = () => {
    const v = {}; fields.forEach(f => { v[f.key] = getVal(f.key); });
    onSave(v); closePopover(); render(); saveState();
  };

  pop.querySelectorAll('[data-pop-action]').forEach(b => {
    b.onclick = () => {
      const action = b.dataset.popAction;
      if (action === 'cancel') return closePopover();
      if (action === 'save') submit();
      if (action === 'delete') { onDelete(); closePopover(); render(); saveState(); }
    };
  });
  pop.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); submit(); }
  });
  const first = pop.querySelector('input, select, textarea');
  if (first) setTimeout(() => { first.focus(); if (first.select) first.select(); }, 30);
}

function renderField(f) {
  if (f.type === 'select') {
    return `<div class="field"><label>${escapeHtml(f.label)}</label>
      <select data-field="${f.key}">
        ${f.options.map(o => `<option value="${escapeHtml(o.value)}" ${o.value === f.value ? 'selected' : ''}>${escapeHtml(o.label)}</option>`).join('')}
      </select></div>`;
  }
  if (f.type === 'checkbox') {
    return `<div class="field"><label>${escapeHtml(f.label)}</label>
      <div class="check"><input type="checkbox" data-field="${f.key}" ${f.value ? 'checked' : ''}>
      <span style="color:var(--mute); font-size:var(--t-xxs);">${escapeHtml(f.hint || '')}</span></div></div>`;
  }
  if (f.type === 'color') {
    const hint = f.hint ? `<span class="color-swatch-label">${escapeHtml(f.hint)}</span>` : '';
    return `<div class="field"><label>${escapeHtml(f.label)}</label>
      <div class="color-field">
        <input type="color" data-field="${f.key}" value="${escapeHtml(f.value || '#0A0A0A')}">
        ${hint}
      </div></div>`;
  }
  // text/date/number with optional datalist
  let datalistAttr = '';
  let datalistHtml = '';
  if (f.suggest && f.suggest.length) {
    const id = `dl-${f.key}-${Math.random().toString(36).slice(2,7)}`;
    datalistAttr = `list="${id}"`;
    datalistHtml = `<datalist id="${id}">${f.suggest.map(s => `<option value="${escapeHtml(s)}"></option>`).join('')}</datalist>`;
  }
  const hint = f.hint ? `<div class="hint">${escapeHtml(f.hint)}</div>` : '';
  return `<div class="field"><label>${escapeHtml(f.label)}</label>
    <div>
      <input type="${f.type}" data-field="${f.key}" value="${escapeHtml(f.value != null ? f.value : '')}"
        ${f.min != null ? `min="${f.min}"` : ''} ${f.max != null ? `max="${f.max}"` : ''} ${datalistAttr}>
      ${datalistHtml}
      ${hint}
    </div></div>`;
}

function closePopover() { document.getElementById('pop-scrim').classList.remove('open'); }

const STATE_OPTS = [
  { value: 'active',    label: 'Active — now' },
  { value: 'committed', label: 'Committed' },
  { value: 'tentative', label: 'Tentative' },
  { value: 'waiting',   label: 'Waiting / blocked' },
  { value: 'beyond',    label: 'Beyond horizon' }
];
const STATE_CYCLE = ['committed', 'active', 'tentative', 'waiting', 'beyond'];

function findPhase(trackId, phaseId) {
  const tr = state.tracks.find(t => t.id === trackId);
  return { track: tr, phase: tr ? tr.phases.find(p => p.id === phaseId) : null };
}
function cyclePhaseState(trackId, phaseId) {
  const { phase } = findPhase(trackId, phaseId);
  if (!phase) return;
  const idx = STATE_CYCLE.indexOf(phase.state);
  phase.state = STATE_CYCLE[(idx + 1) % STATE_CYCLE.length];
  render(); saveState();
}

function editPhase(trackId, phaseId) {
  const { track, phase } = findPhase(trackId, phaseId);
  if (!phase) return;
  openPopover('Phase', phase.label, [
    { type: 'text', key: 'label', label: 'Label', value: phase.label },
    { type: 'select', key: 'state', label: 'State', value: phase.state, options: STATE_OPTS },
    { type: 'date', key: 'start', label: 'Start', value: phase.start },
    { type: 'number', key: 'days', label: 'Days', value: phase.days, min: 1 },
    { type: 'text', key: 'ix', label: 'Index', value: phase.ix || '' }
  ],
  (v) => {
    phase.label = v.label; phase.state = v.state; phase.start = v.start;
    phase.days = Math.max(1, Number(v.days) || 1);
    phase.ix = v.ix || undefined;
  },
  () => { track.phases = track.phases.filter(p => p.id !== phaseId); });
}

function quickLabelPhase(track, suggestedStart, days) {
  openPopover('New phase', `${track.name} · label`, [

  ],
  (v) => {
    if (!v.label) return;
    track.phases.push({
      id: uid(), label: v.label, state: v.state || 'committed',
      start: suggestedStart, days: Math.max(1, days)
    });
  });
}

function editTrack(trackId) {

const TASK_TYPE_OPTS = [
  { value: 'normal', label: 'Normal' },

];

function editTask(taskId) {

  openPopover('Task', task.text.slice(0, 40), [
    { type: 'text', key: 'tag', label: 'Tag', value: task.tag },
    { type: 'text', key: 'text', label: 'Task', value: task.text },

  ],

    task.week = Math.max(1, Number(v.week) || 1);
  },

function tagPool() {
  const set = new Set();
  state.tasks.forEach(t => { if (t.tag && t.tag !== '·') set.add(t.tag); });
  state.tracks.forEach(t => { if (t.name) set.add(t.name); });
  return [...set].sort((a, b) => a.localeCompare(b));
}

// Inline, in-place task composer. Appends a row inside the week-group and focuses the text field.
// Enter commits · Escape cancels · blur-out commits (if text) or cancels (if empty).
function beginAddTask(weekNum) {
  // If there's already an open composer, just focus it
  const existing = document.querySelector(`.row.row-inline[data-week="${weekNum}"]`);
  if (existing) { existing.querySelector('.inline-text')?.focus(); return; }

  // Find the week group that matches this week number
  const weekGroups = document.querySelectorAll('.week-group');
  let group = null;
  weekGroups.forEach(g => {
    const btn = g.querySelector(`[data-add-task="${weekNum}"]`);
    if (btn) group = g;
  });
  if (!group) return;

  const suggestId = `tag-suggest-${weekNum}-${Math.random().toString(36).slice(2,6)}`;
  const row = document.createElement('div');
  row.className = 'row row-inline';
  row.dataset.week = String(weekNum);
  row.innerHTML = `
    <input class="inline-tag" list="${suggestId}" placeholder="tag">
    <input class="inline-text" placeholder="new task — press Enter to save, Esc to cancel">
    <input class="inline-route" placeholder="route (optional)">
    <datalist id="${suggestId}">${tagPool().map(t => `<option value="${escapeHtml(t)}">`).join('')}</datalist>
  `;
  group.appendChild(row);

  const textEl  = row.querySelector('.inline-text');
  const tagEl   = row.querySelector('.inline-tag');
  const routeEl = row.querySelector('.inline-route');
  textEl.focus();

  let done = false;
  const finish = (commit) => {
    if (done) return;
    done = true;
    if (commit) {
      const text = textEl.value.trim();
      if (!text) { row.remove(); return; }
      const tag   = tagEl.value.trim() || '·';
      const route = routeEl.value.trim();
      state.tasks.push({ id: uid(), tag, text, route, type: 'normal', week: weekNum });
      render();
      saveState();
    } else {
      row.remove();
    }
  };

  row.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); finish(true); }
    else if (e.key === 'Escape') { e.preventDefault(); finish(false); }
  });
  // If focus leaves the whole row, auto-commit (or cancel if empty)
  row.addEventListener('focusout', () => {
    setTimeout(() => {
      if (done) return;
      if (!row.contains(document.activeElement)) finish(true);
    }, 40);
  });
}

/* ════════════════════════════════════════════════════
   DRAG SYSTEM
   ════════════════════════════════════════════════════ */

const DRAG_THRESHOLD = 4;
const RESIZE_ZONE = 8;
let drag = null;
const tip = document.getElementById('drag-tip');

function showTip(text, x, y) {
  tip.innerHTML = text;
  tip.style.left = (x + 14) + 'px';
  tip.style.top = (y + 14) + 'px';
  tip.classList.add('show');
}
function hideTip() { tip.classList.remove('show'); }

function startBarDrag(e, barEl) {
  const { phase } = findPhase(barEl.dataset.track, barEl.dataset.phase);
  if (!phase) return;
  const rect = barEl.getBoundingClientRect();
  const x = e.clientX - rect.left;
  let mode = 'move';
  if (rect.width >= 24) {
    if (x <= RESIZE_ZONE) mode = 'resize-l';
    else if (x >= rect.width - RESIZE_ZONE) mode = 'resize-r';
  }
  drag = {
    kind: 'bar', mode, barEl, trackId: barEl.dataset.track, phaseId: barEl.dataset.phase,
    origStart: phase.start, origDays: phase.days,
    pointerStartX: e.clientX, pointerStartY: e.clientY,
    activated: false, modifierUsed: e.metaKey || e.ctrlKey
  };
  e.preventDefault();
}

function startMilestoneDrag(e, msEl) {
  const ms = state.milestones.find(m => m.id === msEl.dataset.ms);
  if (!ms) return;
  drag = {
    kind: 'milestone', msEl, msId: msEl.dataset.ms, origDate: ms.date,
    pointerStartX: e.clientX, pointerStartY: e.clientY, activated: false
  };
  e.preventDefault();
}

function startScrubDrag(e, startX) {
  drag = {
    kind: 'scrub',
    pointerStartX: e.clientX, pointerStartY: e.clientY,
    activated: false,
    currentX: startX,
    currentDate: dateFromX(startX)
  };
  // Immediately show the playhead at click position (even before drag threshold)
  setScrubPosition(startX, drag.currentDate, true);
  e.preventDefault();
}

function startPaintDrag(e, laneEl) {
  const rect = laneEl.getBoundingClientRect();
  const startX = e.clientX - rect.left;
  const startDate = clampDate(dateFromX(startX));
  drag = {
    kind: 'paint', laneEl, trackId: laneEl.dataset.track,
    startX, startDate,
    pointerStartX: e.clientX, pointerStartY: e.clientY,
    activated: false, paintEl: null
  };
  e.preventDefault();
}

function onPointerMove(e) {
  updateScrub(e);
  if (!drag) return;
  const dx = e.clientX - drag.pointerStartX;
  const dy = e.clientY - drag.pointerStartY;
  if (!drag.activated) {
    // Scrub activates immediately (it's the primary interaction)
    if (drag.kind === 'scrub') {
      drag.activated = true;
    } else {
      if (Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;
      drag.activated = true;
    }
    if (drag.kind === 'bar') drag.barEl.classList.add('dragging');
    if (drag.kind === 'milestone') drag.msEl.classList.add('dragging');
    if (drag.kind === 'paint') {
      const el = document.createElement('div');
      el.className = 'paint-bar';
      el.style.top = ROW_PAD + 'px';
      drag.laneEl.appendChild(el);
      drag.paintEl = el;
    }
  }
  const ppd = geom().ppd;
  const dDays = Math.round(dx / ppd);

  if (drag.kind === 'bar') {
    const { phase } = findPhase(drag.trackId, drag.phaseId);
    if (!phase) return;
    if (drag.mode === 'move') {
      phase.start = clampDate(toISO(addDays(fromISO(drag.origStart), dDays)));
      drag.barEl.style.left = (dayOffset(phase.start) * ppd) + 'px';
      drag.barEl.style.width = (phase.days * ppd) + 'px';
      const endDate = toISO(addDays(fromISO(phase.start), phase.days - 1));
      showTip(`<span class="accent">${fmtShort(phase.start)}</span><span class="sep">→</span><span class="accent">${fmtShort(endDate)}</span><span class="sep">·</span>${phase.days}d`, e.clientX, e.clientY);
    } else if (drag.mode === 'resize-r') {
      phase.days = Math.max(1, drag.origDays + dDays);
      drag.barEl.style.width = (phase.days * ppd) + 'px';
      const endDate = toISO(addDays(fromISO(phase.start), phase.days - 1));
      showTip(`${fmtShort(phase.start)}<span class="sep">→</span><span class="accent">${fmtShort(endDate)}</span><span class="sep">·</span><span class="accent">${phase.days}d</span>`, e.clientX, e.clientY);
    } else if (drag.mode === 'resize-l') {
      const maxLeftDays = drag.origDays - 1;
      const shift = Math.min(maxLeftDays, dDays);
      phase.start = clampDate(toISO(addDays(fromISO(drag.origStart), shift)));
      phase.days = Math.max(1, drag.origDays - shift);
      drag.barEl.style.left = (dayOffset(phase.start) * ppd) + 'px';
      drag.barEl.style.width = (phase.days * ppd) + 'px';
      const endDate = toISO(addDays(fromISO(phase.start), phase.days - 1));
      showTip(`<span class="accent">${fmtShort(phase.start)}</span><span class="sep">→</span>${fmtShort(endDate)}<span class="sep">·</span><span class="accent">${phase.days}d</span>`, e.clientX, e.clientY);
    }
  }

  if (drag.kind === 'milestone') {
    const ms = state.milestones.find(m => m.id === drag.msId);
    ms.date = clampDate(toISO(addDays(fromISO(drag.origDate), dDays)));
    drag.msEl.style.left = (dayOffset(ms.date) * ppd) + 'px';
    showTip(`<span class="accent">${fmtShort(ms.date)}</span><span class="sep">·</span>${escapeHtml(ms.label)}`, e.clientX, e.clientY);
  }

  if (drag.kind === 'paint') {
    const rect = drag.laneEl.getBoundingClientRect();
    const curX = e.clientX - rect.left;
    const lx = Math.min(drag.startX, curX);
    const rx = Math.max(drag.startX, curX);
    const startDate = clampDate(dateFromX(lx));
    const endDate   = clampDate(dateFromX(rx));
    const days = Math.max(PAINT_MIN_DAYS, daysBetween(startDate, endDate) + 1);
    drag.paintEl.style.left = (dayOffset(startDate) * ppd) + 'px';
    drag.paintEl.style.width = (days * ppd) + 'px';
    drag.paintStart = startDate;
    drag.paintDays = days;
    showTip(`<span class="accent">${fmtShort(startDate)}</span><span class="sep">→</span><span class="accent">${fmtShort(toISO(addDays(fromISO(startDate), days - 1)))}</span><span class="sep">·</span>${days}d`, e.clientX, e.clientY);
  }

  if (drag.kind === 'scrub') {
    const tlEl = document.getElementById('tl-root');
    const rect = tlEl.getBoundingClientRect();
    let x = e.clientX - rect.left;
    // Clamp to scrubbable area
    const minX = geom().railW;
    const maxX = geom().totalWidth;
    if (x < minX) x = minX;
    if (x > maxX) x = maxX;
    const date = dateFromX(x);
    drag.currentX = x;
    drag.currentDate = date;
    setScrubPosition(x, date, true);
  }
}

function clampDate(iso) {
  const d = fromISO(iso);
  const min = fromISO(state.startDate);
  if (d < min) return state.startDate;
  return iso;
}

function onPointerUp(e) {
  if (!drag) return;
  const wasActivated = drag.activated;

  if (drag.kind === 'bar' && drag.barEl) drag.barEl.classList.remove('dragging');
  if (drag.kind === 'milestone' && drag.msEl) drag.msEl.classList.remove('dragging');
  if (drag.kind === 'paint' && drag.paintEl) drag.paintEl.remove();
  if (drag.kind === 'scrub') {
    // On release, fade scrub back to passive (hover) state
    const scrub = document.getElementById('tl-scrub');
    if (scrub) scrub.classList.remove('active');
    clearScrubHits();
  }
  hideTip();

  if (wasActivated) {
    if (drag.kind === 'paint') {
      const track = state.tracks.find(t => t.id === drag.trackId);
      if (track) quickLabelPhase(track, drag.paintStart, drag.paintDays);
    } else if (drag.kind === 'scrub') {
      // Scrubbing doesn't mutate state — nothing to save
    } else {
      // Re-render full timeline so stacking/row assignment updates after drag
      render();
      saveState();
    }
  } else {
    if (drag.kind === 'bar') {
      if (drag.modifierUsed) cyclePhaseState(drag.trackId, drag.phaseId);
      else editPhase(drag.trackId, drag.phaseId);
    }
    if (drag.kind === 'milestone') editMilestone(drag.msId);
    // scrub click with no movement = silent (just showed playhead briefly)
    if (drag.kind === 'scrub') {
      const scrub = document.getElementById('tl-scrub');
      if (scrub) scrub.classList.remove('active');
      clearScrubHits();
    }
  }
  drag = null;
}

/* SCRUB GUIDE — hover shows passive, click-drag shows active playhead */

function clearScrubHits() {
  document.querySelectorAll('.bar.scrub-hit, .tl-milestone.scrub-hit')
    .forEach(el => el.classList.remove('scrub-hit'));
}

function updateScrubHits(date) {
  clearScrubHits();
  const d = fromISO(date);
  // Bars whose date range contains this date
  document.querySelectorAll('.bar').forEach(barEl => {
    const { phase } = findPhase(barEl.dataset.track, barEl.dataset.phase);
    if (!phase) return;
    const ps = fromISO(phase.start);
    const pe = addDays(ps, phase.days - 1);
    if (d >= ps && d <= pe) barEl.classList.add('scrub-hit');
  });
  // Milestones on exact date
  document.querySelectorAll('.tl-milestone').forEach(msEl => {
    const ms = state.milestones.find(m => m.id === msEl.dataset.ms);
    if (ms && ms.date === date) msEl.classList.add('scrub-hit');
  });
}

function setScrubPosition(x, date, active) {
  const scrub = document.getElementById('tl-scrub');
  const tag = document.getElementById('tl-scrub-tag');
  if (!scrub || !tag) return;
  scrub.style.left = x + 'px';
  tag.textContent = fmtShort(date);
  scrub.classList.add('show');
  if (active) {
    scrub.classList.add('active');
    updateScrubHits(date);
  }
}

function updateScrub(e) {
  if (drag && drag.kind === 'scrub') return; // handled by drag logic
  const scrub = document.getElementById('tl-scrub');
  const tag = document.getElementById('tl-scrub-tag');
  if (!scrub || !tag) return;
  const tlEl = document.getElementById('tl-root');
  if (!tlEl) return;
  const rect = tlEl.getBoundingClientRect();
  const inside = e.clientY >= rect.top && e.clientY <= rect.bottom &&
                 e.clientX >= rect.left && e.clientX <= rect.right;
  if (!inside || !editMode || drag) {
    scrub.classList.remove('show');
    scrub.classList.remove('active');
    return;
  }
  const x = e.clientX - rect.left;
  if (x < geom().railW) {
    scrub.classList.remove('show');
    scrub.classList.remove('active');
    return;
  }
  const date = dateFromX(x);
  scrub.style.left = x + 'px';
  tag.textContent = fmtShort(date);
  scrub.classList.add('show');
  scrub.classList.remove('active');
}

document.addEventListener('pointerdown', (e) => {
  const bar = e.target.closest('.bar');
  if (bar) {
    if (editMode) startBarDrag(e, bar);
    else { e.preventDefault(); editPhase(bar.dataset.track, bar.dataset.phase); }
    return;
  }
  const ms = e.target.closest('.tl-milestone');
  if (ms) {
    if (editMode) startMilestoneDrag(e, ms);
    else { e.preventDefault(); editMilestone(ms.dataset.ms); }
    return;
  }

  if (!editMode) return;

  const tlEl = document.getElementById('tl-root');
  if (!tlEl) return;
  const tlRect = tlEl.getBoundingClientRect();
  const x = e.clientX - tlRect.left;
  if (x < geom().railW) return;             // ignore rail area
  if (x > geom().totalWidth) return;        // ignore beyond content

  // Hit detection: which of these zones are we in?
  const axis = e.target.closest('.tl-axis');
  const msLane = e.target.closest('#ms-lane');
  const lane = e.target.closest('.tl-lane');

  // If Shift is held and we're on a track lane, paint-to-create a phase
  if (e.shiftKey && lane) {
    startPaintDrag(e, lane);
    return;
  }

  // Otherwise: scrub (timeline playhead) is the default everywhere in the timeline body
  if (axis || msLane || lane) {
    startScrubDrag(e, x);
    return;
  }
});

document.addEventListener('pointermove', onPointerMove);
document.addEventListener('pointerup', onPointerUp);
document.addEventListener('pointercancel', onPointerUp);

document.addEventListener('click', (e) => {
  if (drag) return;
  if (editMode) {
    const trackLabel = e.target.closest('.track-label-wrap');
    if (trackLabel) { editTrack(trackLabel.dataset.track); return; }
    if (e.target.id === 'rail-add-track') { addTrack(); return; }
    const row = e.target.closest('.row');
    if (row && row.dataset.task) { editTask(row.dataset.task); return; }
    const addTaskBtn = e.target.closest('[data-add-task]');
    if (addTaskBtn) { beginAddTask(Number(addTaskBtn.dataset.addTask)); return; }
  }
  if (e.target.id === 'pop-scrim') closePopover();
});

document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) {
    if (document.getElementById('pop-scrim').classList.contains('open')) return;
    e.preventDefault(); undo(); return;
  }
  if (e.key === 'e' && !e.metaKey && !e.ctrlKey && !e.altKey) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    toggleEdit(); return;
  }
  if (e.key === 'Escape') {
    if (drag) {
      if (drag.paintEl) drag.paintEl.remove();
      drag = null; hideTip(); render();
    }
    else closePopover();
  }
});

/* ════════════════════════════════════════════════════
   TOOLBAR
   ════════════════════════════════════════════════════ */

function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('btn-edit-toggle');
  btn.classList.toggle('active', editMode);
  btn.classList.toggle('muted', !editMode);
  btn.textContent = editMode ? 'Editing · Live' : 'Read-only';
  render();
}

document.getElementById('btn-edit-toggle').addEventListener('click', toggleEdit);
document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-add-milestone').addEventListener('click', () => addMilestone(realToday()));

document.getElementById('in-start').addEventListener('change', (e) => {
  state.startDate = e.target.value; render(); saveState();
});
document.getElementById('in-horizon').addEventListener('change', (e) => {
  state.horizonDate = e.target.value; render(); saveState();
});

document.getElementById('btn-export').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `time-aligns-${realToday()}.json`;
  a.click(); URL.revokeObjectURL(url);
  flashSave('Exported');
});
document.getElementById('btn-import').addEventListener('click', () => document.getElementById('file-import').click());
document.getElementById('file-import').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imp = JSON.parse(ev.target.result);
      if (imp && imp.tracks && imp.milestones && imp.tasks) {
        state = imp; syncInputs(); render(); saveState(); flashSave('Imported');
      } else { alert('Invalid file.'); }
    } catch (err) { alert('Could not parse file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});
document.getElementById('btn-reset').addEventListener('click', () => {
  if (confirm('Reset to seed timeline? This clears all edits.')) {
    state = JSON.parse(JSON.stringify(SEED));
    syncInputs(); render(); saveState();
  }
});
document.getElementById('btn-sync').addEventListener('click', async () => {
  flashSave('Syncing…');
  await loadState();
  syncInputs(); render();
});
document.getElementById('btn-token').addEventListener('click', () => {
  const existing = getToken();
  const masked = existing ? existing.slice(0, 4) + '…' + existing.slice(-4) : '(none)';
  const next = prompt(
    'GitHub Personal Access Token (fine-grained, Contents: read/write on jalulia/timeline).\n' +
    'Stored only in this browser\'s localStorage. Sent only to api.github.com.\n' +
    'Current: ' + masked + '\n\n' +
    'Paste new token, leave blank to keep, or type "clear" to remove:',
    ''
  );
  if (next === null) return;
  if (next === '') { flashSave('Unchanged'); return; }
  if (next.toLowerCase() === 'clear') { setToken(''); flashSave('Token cleared'); return; }
  setToken(next.trim());
  flashSave('Token saved');
});

function syncInputs() {
  document.getElementById('in-start').value = state.startDate;
  document.getElementById('in-horizon').value = state.horizonDate;
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { recomputeGeometry(); render(); }, 80);
});

(async function init() {
  await loadState();
  syncInputs();
  render();
  snapshot();
  updateClock();
  setInterval(updateClock, 30000);
})();
</script>
</body>
</html>
