const TASK_TYPE_CYCLE = ['normal', 'decision', 'blocked'];
const TASK_TYPE_GLYPH = { normal: 'N', decision: '◆', blocked: '▲' };
const TASK_TYPE_TITLE = {
  normal:   'Normal — click to mark as decision ◆',
  decision: 'Decision — click to mark as blocked ▲',
  blocked:  'Blocked — click to return to normal'
};

function tagPool() {
  const set = new Set();
  state.tasks.forEach(t => { if (t.tag && t.tag !== '·') set.add(t.tag); });
  state.tracks.forEach(t => { if (t.name) set.add(t.name); });
  return [...set].sort((a, b) => a.localeCompare(b));
}

// Shared inline row scaffold used by both beginAddTask and beginEditTask.
// Returns the row element, pre-wired controls, and a commit/revert pair.
// Caller decides what commit() actually does with the values.
function buildInlineRow({ weekNum, taskId, tag='', text='', route='', type='normal', placeholder }) {
  const suggestId = `tag-suggest-${Math.random().toString(36).slice(2, 8)}`;
  const row = document.createElement('div');
  row.className = 'row row-inline';
  if (weekNum != null) row.dataset.week = String(weekNum);
  if (taskId != null) row.dataset.task = String(taskId);
  row.innerHTML = `
    <input class="inline-tag" list="${suggestId}" placeholder="tag" value="${escapeHtml(tag)}">
    <input class="inline-text" placeholder="${escapeHtml(placeholder || 'task — Enter to save, Esc to cancel')}" value="${escapeHtml(text)}">
    <input class="inline-route" placeholder="route (optional)" value="${escapeHtml(route)}">
    <datalist id="${suggestId}">${tagPool().map(t => `<option value="${escapeHtml(t)}">`).join('')}</datalist>
    <span class="inline-controls">
      <button type="button" class="type-chip" data-type="${escapeHtml(type)}" title="${escapeHtml(TASK_TYPE_TITLE[type] || '')}">${TASK_TYPE_GLYPH[type] || 'N'}</button>
      ${taskId != null ? `<button type="button" class="inline-delete" title="Delete task" aria-label="Delete task">×</button>` : ''}
    </span>
  `;

  const tagEl = row.querySelector('.inline-tag');
  const textEl = row.querySelector('.inline-text');
  const routeEl = row.querySelector('.inline-route');
  const chipEl = row.querySelector('.type-chip');
  const delEl = row.querySelector('.inline-delete');

  // Type chip cycles normal → decision → blocked → normal. Purely local until commit.
  chipEl.addEventListener('click', (e) => {
    e.preventDefault(); e.stopPropagation();
    const cur = chipEl.dataset.type || 'normal';
    const next = TASK_TYPE_CYCLE[(TASK_TYPE_CYCLE.indexOf(cur) + 1) % TASK_TYPE_CYCLE.length];
    chipEl.dataset.type = next;
    chipEl.textContent = TASK_TYPE_GLYPH[next];
    chipEl.title = TASK_TYPE_TITLE[next];
    // Keep focus where it was so commit/cancel behaviour isn't disrupted.
    (document.activeElement === chipEl ? textEl : document.activeElement)?.focus?.();
  });

  // Swallow mousedown on controls so they don't steal focus for a blink and cause a
  // misleading focusout/commit round-trip.
  chipEl.addEventListener('mousedown', (e) => e.preventDefault());
  if (delEl) delEl.addEventListener('mousedown', (e) => e.preventDefault());

  return { row, tagEl, textEl, routeEl, chipEl, delEl };
}

// Synchronously finish (commit or cancel) any other open inline rows so we don't end
// up with two composers fighting for focus — and so a delayed focusout handler
// doesn't fire render() after a fresh composer was inserted.
// ── Shared inline-editor registry ───────────────────────────────
// Any inline editor (task row, track row, phase bar, milestone marker)
// registers itself here so opening a new one commits any currently open one.
// This is what enforces the single-inline-editor-open invariant across the app.
const _activeInlineEditors = new Set();
function registerInlineEditor(finishFn) {
  const entry = { finish: finishFn };
  _activeInlineEditors.add(entry);
  return () => _activeInlineEditors.delete(entry);
}
function closeAllInlineEditors(except) {
  // Copy to array because finish() mutates the set via unregister().
  for (const entry of Array.from(_activeInlineEditors)) {
    if (entry === except) continue;
    try { entry.finish('commit'); } catch (_) { /* swallow */ }
  }
}

function closeOtherInlineRows(exceptRow) {
  document.querySelectorAll('.row.row-inline').forEach(r => {
    if (r === exceptRow) return;
    if (typeof r._finishInline === 'function') r._finishInline('commit');
  });
  closeAllInlineEditors();
}

// Inline task composer — appends a fresh row under the clicked week's add-task line.
// Enter commits · Escape cancels · blur-out commits (or cancels if empty).
function beginAddTask(weekNum) {
  // If there's already an open add-composer in this week, just refocus it.
  const existing = document.querySelector(`.row.row-inline[data-week="${weekNum}"]:not([data-task])`);
  if (existing) { existing.querySelector('.inline-text')?.focus(); return; }

  // Close any other open composer synchronously so state and DOM stay in lockstep.
  closeOtherInlineRows(null);

  const weekGroups = document.querySelectorAll('.week-group');
  let group = null;
  weekGroups.forEach(g => {
    const btn = g.querySelector(`[data-add-task="${weekNum}"]`);
    if (btn) group = g;
  });
  if (!group) return;

  const { row, tagEl, textEl, routeEl, chipEl } = buildInlineRow({
    weekNum, type: 'normal',
    placeholder: 'new task — Enter to save, Esc to cancel'
  });
  // Slot above any "empty-hint" so the composer is visually continuous with the week.
  const emptyHint = group.querySelector('.empty-hint');
  if (emptyHint) group.insertBefore(row, emptyHint); else group.appendChild(row);
  textEl.focus();

  let done = false;
  const finish = (action) => {
    if (done) return;
    done = true;
    const commit = action === 'commit' || action === true;
    if (commit) {
      const text = textEl.value.trim();
      if (!text) { row.remove(); return; }
      const tag = tagEl.value.trim() || '·';
      const route = routeEl.value.trim();
      const type = chipEl.dataset.type || 'normal';
      state.tasks.push({ id: uid(), tag, text, route, type, week: weekNum });
      render(); saveState();
    } else {
      row.remove();
    }
  };
  row._finishInline = finish;

  row.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); finish('commit'); }
    else if (e.key === 'Escape') { e.preventDefault(); finish('cancel'); }
  });
  row.addEventListener('focusout', () => {
    setTimeout(() => {
      if (done) return;
      if (!row.contains(document.activeElement)) finish('commit');
    }, 40);
  });
}

// Inline task editor — swaps an existing row's contents for editable inputs in place.
// Same keyboard semantics as beginAddTask. Type chip cycles; delete button removes.
function beginEditTask(taskId) {
  const task = state.tasks.find(t => t.id === taskId);
  if (!task) return;
  const oldRow = document.querySelector(`.row[data-task="${taskId}"]`);
  if (!oldRow || oldRow.classList.contains('row-inline')) return;

  // Synchronously commit/close any other open inline rows before swapping this one.
  closeOtherInlineRows(oldRow);

  const { row, tagEl, textEl, routeEl, chipEl, delEl } = buildInlineRow({
    taskId, tag: task.tag, text: task.text, route: task.route || '', type: task.type || 'normal',
    placeholder: 'task — Enter to save, Esc to revert'
  });
  oldRow.replaceWith(row);

  // Focus the text field and place caret at end (less disruptive than selecting all).
  textEl.focus();
  try { textEl.setSelectionRange(textEl.value.length, textEl.value.length); } catch (_) {}

  const original = { tag: task.tag, text: task.text, route: task.route || '', type: task.type || 'normal' };
  let done = false;

  const revert = () => { render(); };

  const commit = () => {
    const text = textEl.value.trim();
    if (!text) {
      // Committing empty text is treated as delete so users don't end up with ghost rows.
      state.tasks = state.tasks.filter(t => t.id !== taskId);
    } else {
      task.tag = tagEl.value.trim() || '·';
      task.text = text;
      task.route = routeEl.value.trim();
      task.type = chipEl.dataset.type || 'normal';
    }
    render(); saveState();
  };

  const finish = (action) => {
    if (done) return;
    done = true;
    if (action === 'commit') {
      // No-op diff avoids a spurious save/commit churn on GitHub.
      const changed = tagEl.value.trim() !== original.tag ||
                      textEl.value.trim() !== original.text ||
                      routeEl.value.trim() !== original.route ||
                      (chipEl.dataset.type || 'normal') !== original.type;
      if (!changed) { revert(); return; }
      commit();
    } else if (action === 'delete') {
      state.tasks = state.tasks.filter(t => t.id !== taskId);
      render(); saveState();
    } else {
      revert();
    }
  };

  row.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); finish('commit'); }
    else if (e.key === 'Escape') { e.preventDefault(); finish('cancel'); }
  });
  row.addEventListener('focusout', () => {
    setTimeout(() => {
      if (done) return;
      if (!row.contains(document.activeElement)) finish('commit');
    }, 40);
  });
  if (delEl) {
    delEl.addEventListener('click', (e) => {
      e.preventDefault(); e.stopPropagation();
      finish('delete');
    });
  }
}

/* ════════════════════════════════════════════════════
   DRAG SYSTEM
   ════════════════════════════════════════════════════ */

const DRAG_THRESHOLD = 4;
const RESIZE_ZONE = 8;
let drag = null;
const tip = document.getElementById('drag-tip');

function showTip(text, x, y) {
  tip.innerHTML = text;
  tip.style.left = (x + 14) + 'px';
  tip.style.top = (y + 14) + 'px';
  tip.classList.add('show');
}
function hideTip() { tip.classList.remove('show'); }

function startBarDrag(e, barEl) {
  const { phase } = findPhase(barEl.dataset.track, barEl.dataset.phase);
  if (!phase) return;
  const rect = barEl.getBoundingClientRect();
  const x = e.clientX - rect.left;
  let mode = 'move';
  if (rect.width >= 24) {
    if (x <= RESIZE_ZONE) mode = 'resize-l';
    else if (x >= rect.width - RESIZE_ZONE) mode = 'resize-r';
  }
  drag = {
    kind: 'bar', mode, barEl, trackId: barEl.dataset.track, phaseId: barEl.dataset.phase,
    origStart: phase.start, origDays: phase.days,
    pointerStartX: e.clientX, pointerStartY: e.clientY,
    activated: false, modifierUsed: e.metaKey || e.ctrlKey
  };
  e.preventDefault();
}

function startMilestoneDrag(e, msEl) {
  const ms = state.milestones.find(m => m.id === msEl.dataset.ms);
  if (!ms) return;
  drag = {
    kind: 'milestone', msEl, msId: msEl.dataset.ms, origDate: ms.date,
    pointerStartX: e.clientX, pointerStartY: e.clientY, activated: false
  };
  e.preventDefault();
}

function startScrubDrag(e, startX) {
  drag = {
    kind: 'scrub',
    pointerStartX: e.clientX, pointerStartY: e.clientY,
    activated: false,
    currentX: startX,
    currentDate: dateFromX(startX)
  };
  // Immediately show the playhead at click position (even before drag threshold)
  setScrubPosition(startX, drag.currentDate, true);
  e.preventDefault();
}

function startPaintDrag(e, laneEl) {
  const rect = laneEl.getBoundingClientRect();
  const startX = e.clientX - rect.left;
  const startDate = clampDate(dateFromX(startX));
  drag = {
    kind: 'paint', laneEl, trackId: laneEl.dataset.track,
    startX, startDate,
    pointerStartX: e.clientX, pointerStartY: e.clientY,
    activated: false, paintEl: null
  };
  e.preventDefault();
}

function onPointerMove(e) {
  updateScrub(e);
  if (!drag) return;
  const dx = e.clientX - drag.pointerStartX;
  const dy = e.clientY - drag.pointerStartY;
  if (!drag.activated) {
    // Scrub activates immediately (it's the primary interaction)
    if (drag.kind === 'scrub') {
      drag.activated = true;
    } else {
      if (Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;
      drag.activated = true;
    }
    if (drag.kind === 'bar') drag.barEl.classList.add('dragging');
    if (drag.kind === 'milestone') drag.msEl.classList.add('dragging');
    if (drag.kind === 'paint') {
      const el = document.createElement('div');
      el.className = 'paint-bar';
      el.style.top = ROW_PAD + 'px';
      drag.laneEl.appendChild(el);
      drag.paintEl = el;
    }
  }
  const ppd = geom().ppd;
  const dDays = Math.round(dx / ppd);

  if (drag.kind === 'bar') {
    const { phase } = findPhase(drag.trackId, drag.phaseId);
    if (!phase) return;
    if (drag.mode === 'move') {
      phase.start = clampDate(toISO(addDays(fromISO(drag.origStart), dDays)));
      drag.barEl.style.left = (dayOffset(phase.start) * ppd) + 'px';
      drag.barEl.style.width = (phase.days * ppd) + 'px';
      const endDate = toISO(addDays(fromISO(phase.start), phase.days - 1));
      showTip(`<span class="accent">${fmtShort(phase.start)}</span><span class="sep">→</span><span class="accent">${fmtShort(endDate)}</span><span class="sep">·</span>${phase.days}d`, e.clientX, e.clientY);
    } else if (drag.mode === 'resize-r') {
      phase.days = Math.max(1, drag.origDays + dDays);
      drag.barEl.style.width = (phase.days * ppd) + 'px';
      const endDate = toISO(addDays(fromISO(phase.start), phase.days - 1));
      showTip(`${fmtShort(phase.start)}<span class="sep">→</span><span class="accent">${fmtShort(endDate)}</span><span class="sep">·</span><span class="accent">${phase.days}d</span>`, e.clientX, e.clientY);
    } else if (drag.mode === 'resize-l') {
      const maxLeftDays = drag.origDays - 1;
      const shift = Math.min(maxLeftDays, dDays);
      phase.start = clampDate(toISO(addDays(fromISO(drag.origStart), shift)));
      phase.days = Math.max(1, drag.origDays - shift);
      drag.barEl.style.left = (dayOffset(phase.start) * ppd) + 'px';
      drag.barEl.style.width = (phase.days * ppd) + 'px';
      const endDate = toISO(addDays(fromISO(phase.start), phase.days - 1));
      showTip(`<span class="accent">${fmtShort(phase.start)}</span><span class="sep">→</span>${fmtShort(endDate)}<span class="sep">·</span><span class="accent">${phase.days}d</span>`, e.clientX, e.clientY);
    }
  }

  if (drag.kind === 'milestone') {
    const ms = state.milestones.find(m => m.id === drag.msId);
    ms.date = clampDate(toISO(addDays(fromISO(drag.origDate), dDays)));
    drag.msEl.style.left = (dayOffset(ms.date) * ppd) + 'px';
    showTip(`<span class="accent">${fmtShort(ms.date)}</span><span class="sep">·</span>${escapeHtml(ms.label)}`, e.clientX, e.clientY);
  }

  if (drag.kind === 'paint') {
    const rect = drag.laneEl.getBoundingClientRect();
    const curX = e.clientX - rect.left;
    const lx = Math.min(drag.startX, curX);
    const rx = Math.max(drag.startX, curX);
    const startDate = clampDate(dateFromX(lx));
    const endDate   = clampDate(dateFromX(rx));
    const days = Math.max(PAINT_MIN_DAYS, daysBetween(startDate, endDate) + 1);
    drag.paintEl.style.left = (dayOffset(startDate) * ppd) + 'px';
    drag.paintEl.style.width = (days * ppd) + 'px';
    drag.paintStart = startDate;
    drag.paintDays = days;
    showTip(`<span class="accent">${fmtShort(startDate)}</span><span class="sep">→</span><span class="accent">${fmtShort(toISO(addDays(fromISO(startDate), days - 1)))}</span><span class="sep">·</span>${days}d`, e.clientX, e.clientY);
  }

  if (drag.kind === 'scrub') {
    const tlEl = document.getElementById('tl-root');
    const rect = tlEl.getBoundingClientRect();
    const viewportX = e.clientX - rect.left;
    // Rail is pinned to viewport-left; translate viewport x → content x
    const contentX = viewportX + tlEl.scrollLeft;
    // Clamp in content coordinates. Rail covers [scrollLeft, scrollLeft+railW].
    const railW = geom().railW;
    const minX = tlEl.scrollLeft + railW;
    const maxX = geom().totalWidth;
    let x = Math.max(minX, Math.min(maxX, contentX));
    const date = dateFromX(x);
    drag.currentX = x;
    drag.currentDate = date;
    setScrubPosition(x, date, true);
  }
}

function clampDate(iso) {
  const d = fromISO(iso);
  const min = fromISO(state.startDate);
  if (d < min) return state.startDate;
  return iso;
}

function onPointerUp(e) {
  if (!drag) return;
  const wasActivated = drag.activated;

  if (drag.kind === 'bar' && drag.barEl) drag.barEl.classList.remove('dragging');
  if (drag.kind === 'milestone' && drag.msEl) drag.msEl.classList.remove('dragging');
  if (drag.kind === 'paint' && drag.paintEl) drag.paintEl.remove();
  if (drag.kind === 'scrub') {
    // On release, fade scrub back to passive (hover) state
    const scrub = document.getElementById('tl-scrub');
    if (scrub) scrub.classList.remove('active');
    clearScrubHits();
  }
  hideTip();

  if (wasActivated) {
    if (drag.kind === 'paint') {
      const track = state.tracks.find(t => t.id === drag.trackId);
      if (track) quickLabelPhase(track, drag.paintStart, drag.paintDays);
    } else if (drag.kind === 'scrub') {
      // Scrubbing doesn't mutate state — nothing to save
    } else {
      // Re-render full timeline so stacking/row assignment updates after drag
      render();
      saveState();
    }
  } else {
    if (drag.kind === 'bar') {
      if (drag.modifierUsed) cyclePhaseState(drag.trackId, drag.phaseId);
      else editPhase(drag.trackId, drag.phaseId);
    }
    if (drag.kind === 'milestone') editMilestone(drag.msId);
    // scrub click with no movement = silent (just showed playhead briefly)
    if (drag.kind === 'scrub') {
      const scrub = document.getElementById('tl-scrub');
      if (scrub) scrub.classList.remove('active');
      clearScrubHits();
    }
  }
  drag = null;
}

/* SCRUB GUIDE — hover shows passive, click-drag shows active playhead */

function clearScrubHits() {
  document.querySelectorAll('.bar.scrub-hit, .tl-milestone.scrub-hit')
    .forEach(el => el.classList.remove('scrub-hit'));
}

function updateScrubHits(date) {
  clearScrubHits();
  const d = fromISO(date);
  // Bars whose date range contains this date
  document.querySelectorAll('.bar').forEach(barEl => {
    const { phase } = findPhase(barEl.dataset.track, barEl.dataset.phase);
    if (!phase) return;
    const ps = fromISO(phase.start);
    const pe = addDays(ps, phase.days - 1);
    if (d >= ps && d <= pe) barEl.classList.add('scrub-hit');
  });
  // Milestones on exact date
  document.querySelectorAll('.tl-milestone').forEach(msEl => {
    const ms = state.milestones.find(m => m.id === msEl.dataset.ms);
    if (ms && ms.date === date) msEl.classList.add('scrub-hit');
  });
}

function setScrubPosition(x, date, active) {
  const scrub = document.getElementById('tl-scrub');
  const tag = document.getElementById('tl-scrub-tag');
  if (!scrub || !tag) return;
  scrub.style.left = x + 'px';
  tag.textContent = fmtShort(date);
  scrub.classList.add('show');
  if (active) {
    scrub.classList.add('active');
    updateScrubHits(date);
  }
}

function updateScrub(e) {
  if (drag && drag.kind === 'scrub') return; // handled by drag logic
  const scrub = document.getElementById('tl-scrub');
  const tag = document.getElementById('tl-scrub-tag');
  if (!scrub || !tag) return;
  const tlEl = document.getElementById('tl-root');
  if (!tlEl) return;
  const rect = tlEl.getBoundingClientRect();
  const inside = e.clientY >= rect.top && e.clientY <= rect.bottom &&
                 e.clientX >= rect.left && e.clientX <= rect.right;
  if (!inside || !editMode || drag) {
    scrub.classList.remove('show');
    scrub.classList.remove('active');
    return;
  }
  const viewportX = e.clientX - rect.left;
  // Rail is pinned to viewport's left edge; don't scrub over it
  if (viewportX < geom().railW) {
    scrub.classList.remove('show');
    scrub.classList.remove('active');
    return;
  }
  const contentX = viewportX + tlEl.scrollLeft;
  if (contentX > geom().totalWidth) {
    scrub.classList.remove('show');
    scrub.classList.remove('active');
    return;
  }
  const date = dateFromX(contentX);
  scrub.style.left = contentX + 'px';
  tag.textContent = fmtShort(date);
  scrub.classList.add('show');
  scrub.classList.remove('active');
}

document.addEventListener('pointerdown', (e) => {
  // If we're inside an inline editor (track, phase bar, milestone), don't
  // treat the pointerdown as a drag-start or a modal-open: the editor's own
  // handlers own the event.
  if (e.target.closest('.bar.editing, .tl-milestone.editing, .track-label-wrap.editing, #rail-add-track.editing')) {
    return;
  }
  const bar = e.target.closest('.bar');
  if (bar) {
    if (editMode) startBarDrag(e, bar);
    else { e.preventDefault(); beginEditPhase(bar.dataset.track, bar.dataset.phase); }
    return;
  }
  const ms = e.target.closest('.tl-milestone');
  if (ms) {
    if (editMode) startMilestoneDrag(e, ms);
    else { e.preventDefault(); beginEditMilestone(ms.dataset.ms); }
    return;
  }

  if (!editMode) return;

  const tlEl = document.getElementById('tl-root');
  if (!tlEl) return;
  const tlRect = tlEl.getBoundingClientRect();
  const viewportX = e.clientX - tlRect.left;
  if (viewportX < geom().railW) return;     // ignore rail area (pinned to viewport)
  const contentX = viewportX + tlEl.scrollLeft;
  if (contentX > geom().totalWidth) return; // ignore beyond content

  // Hit detection: which of these zones are we in?
  const axis = e.target.closest('.tl-axis');
  const msLane = e.target.closest('#ms-lane');
  const lane = e.target.closest('.tl-lane');

  // If Shift is held and we're on a track lane, paint-to-create a phase
  if (e.shiftKey && lane) {
    startPaintDrag(e, lane);
    return;
  }

  // Click on empty spot in the milestones lane plants a new milestone at that date.
  // (Clicks directly on an existing milestone are already handled above and returned.)
  if (msLane) {
    e.preventDefault();
    beginAddMilestoneAt(dateFromX(contentX));
    return;
  }

  // Otherwise: scrub (timeline playhead) is the default in axis + track lanes
  if (axis || lane) {
    startScrubDrag(e, contentX);
    return;
  }
});

document.addEventListener('pointermove', onPointerMove);
document.addEventListener('pointerup', onPointerUp);
document.addEventListener('pointercancel', onPointerUp);

/* Cmd/Ctrl + wheel = cursor-anchored zoom. Wheel alone = native horizontal scroll.
   We non-passive so we can preventDefault and block the browser's page-zoom. */
document.addEventListener('wheel', (e) => {
  if (!e.ctrlKey && !e.metaKey) return;
  const tlEl = document.getElementById('tl-root');
  if (!tlEl) return;
  const rect = tlEl.getBoundingClientRect();
  const inside = e.clientX >= rect.left && e.clientX <= rect.right
              && e.clientY >= rect.top  && e.clientY <= rect.bottom;
  if (!inside) return;
  e.preventDefault();
  const viewportX = e.clientX - rect.left;
  const anchorDate = dateFromX(viewportX + tlEl.scrollLeft);
  // Wheel delta → multiplicative zoom. deltaY < 0 (scroll up) = zoom in.
  const dir = e.deltaY < 0 ? 1 : -1;
  const factor = dir > 0 ? ZOOM_STEP : 1 / ZOOM_STEP;
  applyZoom(zoomFactor * factor, { viewportX, date: anchorDate });
}, { passive: false });

document.addEventListener('click', (e) => {
  if (drag) return;
  if (editMode) {
    const trackLabel = e.target.closest('.track-label-wrap');
    if (trackLabel) { beginEditTrack(trackLabel.dataset.track); return; }
    // Only open the inline add when clicking the + Track affordance itself.
    // Ignore clicks inside it once it's been swapped to inline-edit mode.
    if (e.target.id === 'rail-add-track' && !e.target.classList.contains('editing')) {
      beginAddTrack(); return;
    }
    if (e.target.closest('#rail-add-track.editing')) return;
    // Ignore clicks inside an inline composer / editor so its own inputs and
    // controls (type chip, delete, inputs) don't re-trigger an edit swap.
    const inlineHit = e.target.closest('.row.row-inline');
    if (inlineHit) return;
    const row = e.target.closest('.row');
    if (row && row.dataset.task) { beginEditTask(row.dataset.task); return; }
    const addTaskBtn = e.target.closest('[data-add-task]');
    if (addTaskBtn) { beginAddTask(Number(addTaskBtn.dataset.addTask)); return; }
  }
  if (e.target.id === 'pop-scrim') closePopover();
});

document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) {
    if (document.getElementById('pop-scrim').classList.contains('open')) return;
    e.preventDefault(); undo(); return;
  }
  if (e.key === 'e' && !e.metaKey && !e.ctrlKey && !e.altKey) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
    toggleEdit(); return;
  }
  if (e.key === 'Escape') {
    if (drag) {
      if (drag.paintEl) drag.paintEl.remove();
      drag = null; hideTip(); render();
      return;
    }
    if (resetArmed) { disarmReset(); return; }
    if (document.getElementById('token-row').classList.contains('open') &&
        !document.getElementById('token-row').contains(document.activeElement)) {
      closeTokenRow(); return;
    }
    closePopover();
  }
});

/* ════════════════════════════════════════════════════
   TOOLBAR
   ════════════════════════════════════════════════════ */

function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('btn-edit-toggle');
  btn.classList.toggle('active', editMode);
  btn.classList.toggle('muted', !editMode);
  btn.textContent = editMode ? 'Editing · Live' : 'Read-only';
  render();
}

document.getElementById('btn-edit-toggle').addEventListener('click', toggleEdit);
document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-add-milestone').addEventListener('click', () => addMilestone(realToday()));

document.getElementById('btn-zoom-in').addEventListener('click', () => applyZoom(zoomFactor * ZOOM_STEP, null));
document.getElementById('btn-zoom-out').addEventListener('click', () => applyZoom(zoomFactor / ZOOM_STEP, null));
document.getElementById('btn-zoom-fit').addEventListener('click', () => zoomFit());

document.getElementById('in-start').addEventListener('change', (e) => {
  state.startDate = e.target.value; render(); saveState();
});
document.getElementById('in-horizon').addEventListener('change', (e) => {
  state.horizonDate = e.target.value; render(); saveState();
});

document.getElementById('btn-export').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `time-aligns-${realToday()}.json`;
  a.click(); URL.revokeObjectURL(url);
  flashSave('Exported');
});
document.getElementById('btn-import').addEventListener('click', () => document.getElementById('file-import').click());
document.getElementById('file-import').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imp = JSON.parse(ev.target.result);
      if (imp && imp.tracks && imp.milestones && imp.tasks) {
        state = imp; syncInputs(); render(); saveState(); flashSave('Imported');
      } else { alert('Invalid file.'); }
    } catch (err) { alert('Could not parse file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});
/* Two-step Reset — avoids a native confirm() dialog.
   First click puts the button in a "confirming" state for 3s; a second click
   within that window actually resets. Anything else (timeout, click elsewhere,
   Escape) reverts the button silently. */
let resetArmed = false;
let resetTimer = null;
const resetBtn = document.getElementById('btn-reset');
function disarmReset() {
  if (!resetArmed) return;
  resetArmed = false;
  resetBtn.textContent = 'Reset';
  resetBtn.classList.remove('confirming');
  if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }
}
resetBtn.addEventListener('click', () => {
  if (!resetArmed) {
    resetArmed = true;
    resetBtn.textContent = 'Confirm reset · clears edits';
    resetBtn.classList.add('confirming');
    resetTimer = setTimeout(disarmReset, 3000);
    return;
  }
  disarmReset();
  state = JSON.parse(JSON.stringify(SEED));
  syncInputs(); render(); saveState();
  flashSave('Reset');
});
document.addEventListener('click', (e) => {
  if (resetArmed && !e.target.closest('#btn-reset')) disarmReset();
}, true);

document.getElementById('btn-sync').addEventListener('click', async () => {
  flashSave('Syncing…');
  await loadState();
  syncInputs(); render();
});

/* Inline token editor — a collapsible row of the toolbar instead of a native prompt().
   The input is never shown in plain text; the "current" slot only shows a masked hint. */
const tokenRow = document.getElementById('token-row');
const tokenInput = document.getElementById('in-token');
const tokenCurrent = document.getElementById('token-current');
function refreshTokenCurrent() {
  const t = getToken();
  tokenCurrent.textContent = t ? `current: ${t.slice(0, 4)}…${t.slice(-4)}` : 'current: (none)';
}
function openTokenRow() {
  refreshTokenCurrent();
  tokenInput.value = '';
  tokenRow.classList.add('open');
  setTimeout(() => tokenInput.focus(), 20);
}
function closeTokenRow() {
  tokenRow.classList.remove('open');
  tokenInput.value = '';
}
document.getElementById('btn-token').addEventListener('click', () => {
  if (tokenRow.classList.contains('open')) closeTokenRow();
  else openTokenRow();
});
document.getElementById('btn-token-cancel').addEventListener('click', closeTokenRow);
document.getElementById('btn-token-save').addEventListener('click', () => {
  const v = tokenInput.value.trim();
  if (!v) { flashSave('Unchanged'); closeTokenRow(); return; }
  if (v.toLowerCase() === 'clear') { setToken(''); flashSave('Token cleared'); closeTokenRow(); return; }
  setToken(v);
  flashSave('Token saved');
  closeTokenRow();
});
tokenInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('btn-token-save').click(); }
  else if (e.key === 'Escape') { e.preventDefault(); closeTokenRow(); }
});

function syncInputs() {
  document.getElementById('in-start').value = state.startDate;
  document.getElementById('in-horizon').value = state.horizonDate;
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { recomputeGeometry(); render(); }, 80);
});

(async function init() {
  await loadState();
  syncInputs();
  render();
  snapshot();
  updateClock();
  setInterval(updateClock, 30000);

  // Keep the rail pinned to the viewport's left edge as the timeline scrolls.
  const tlEl = document.getElementById('tl-root');
  if (tlEl) {
    tlEl.addEventListener('scroll', updateRailTransform, { passive: true });
    updateRailTransform();
  }
  updateZoomBadge();
})();
</script>
</body>
</html>
